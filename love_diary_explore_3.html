/* ============================================================
   E: 打卡热力图
============================================================ */
const ActivityHeatmap = () => {
  const seed = (n) => (n*1234567+89)%17;
  const months = ['11月','12月','1月','2月','3月','4月','5月','6月'];
  const weeks = 34;
  const data = Array.from({length:weeks}, (_,w) =>
    Array.from({length:7}, (_,d) => {
      const s = seed(w*7+d);
      const recency = w/weeks;
      return s < (3+recency*8) ? Math.min(4,Math.floor(s/2)+1) : 0;
    })
  );
  const colors = ['#f0f0f0','rgba(255,77,136,0.2)','rgba(255,77,136,0.45)','rgba(255,77,136,0.72)',T.brand];
  return (
    <Phone>
      <LNav title="打卡热力图" sub="2025年11月 — 2026年6月"/>
      <div style={{flex:1,overflow:'hidden',background:T.bg}}>
        <div style={{background:T.sur,padding:'16px',marginBottom:8}}>
          {/* Month labels */}
          <div style={{display:'flex',marginBottom:6,paddingLeft:14}}>
            {months.map((m,i)=>(
              <div key={i} style={{width:`${100/months.length}%`,fontSize:10,color:T.t}}>{m}</div>
            ))}
          </div>
          {/* Grid */}
          <div style={{display:'flex',gap:3}}>
            {/* Day labels */}
            <div style={{display:'flex',flexDirection:'column',gap:3,marginRight:2}}>
              {['一','','三','','五','','日'].map((d,i)=>(
                <div key={i} style={{height:10,width:10,fontSize:9,color:T.t,display:'flex',alignItems:'center',justifyContent:'center'}}>{d}</div>
              ))}
            </div>
            {data.map((week,wi)=>(
              <div key={wi} style={{display:'flex',flexDirection:'column',gap:3}}>
                {week.map((val,di)=>(
                  <div key={di} style={{width:9,height:10,borderRadius:2,background:colors[val]}}/>
                ))}
              </div>
            ))}
          </div>
          {/* Legend */}
          <div style={{display:'flex',alignItems:'center',gap:4,marginTop:10,justifyContent:'flex-end'}}>
            <span style={{fontSize:10,color:T.t}}>少</span>
            {colors.map((c,i)=>(<div key={i} style={{width:9,height:10,borderRadius:2,background:c}}/>))}
            <span style={{fontSize:10,color:T.t}}>多</span>
          </div>
        </div>
        {/* Stats */}
        <div style={{background:T.sur,padding:'14px 16px',marginBottom:8}}>

          {/* Empty cells for Mon offset */}
          {[0,1].map(i=>(<div key={`e${i}`}/>))}
          {phases.map((p,i)=>{
            const day = i+1;
