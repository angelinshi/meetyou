<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <title>恋爱日记首页模块 · 顶部栏方案</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    html,body{margin:0;padding:0;background:#EDECEA;font-family:-apple-system,"PingFang SC","Helvetica Neue",system-ui,sans-serif;}
    *{box-sizing:border-box;}
    #root{width:100vw;height:100vh;}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

// ── 公用 token ──────────────────────────────────────────────────
const C = {
  rose: '#FF4D88', roseSoft: 'rgba(255,77,136,0.10)',
  bg: '#F2F2F5', surface: '#fff',
  textPri: '#323232', textSec: '#666', textTer: '#999',
  line: 'rgba(0,0,0,0.08)', link: '#4f7cae',
  font: '"PingFang SC","SF Pro Text","Helvetica Neue",Arial,sans-serif',
  rsm: 8, rmd: 12, rpill: 999,
  shadow1: '0 2px 10px rgba(50,50,50,0.08)',
};
const USER    = { name:'女友殿下', initial:'女', bg:'#FFB5C8' };
const PARTNER = { name:'男友先生', initial:'男', bg:'#A8C5E0' };

// 剪影头像
function Ava({ person, size=32 }) {
  const isFemale = person === USER;
  const bg = person.bg;
  return (
    <div style={{ width:size, height:size, borderRadius:'50%', background:bg,
      overflow:'hidden', display:'flex', alignItems:'flex-end', justifyContent:'center', flexShrink:0 }}>
      {isFemale ? (
        <svg width={size*0.72} height={size*0.82} viewBox="0 0 36 41" fill="none">
          <ellipse cx="18" cy="10" rx="7" ry="7.5" fill="rgba(255,255,255,0.92)"/>
          <path d="M11 10 Q11 2 18 2 Q25 2 25 10" fill="rgba(255,255,255,0.92)"/>
          <path d="M11 8 Q9 12 10 16" stroke="rgba(255,255,255,0.92)" strokeWidth="2.5" strokeLinecap="round"/>
          <path d="M25 8 Q27 12 26 16" stroke="rgba(255,255,255,0.92)" strokeWidth="2.5" strokeLinecap="round"/>
          <path d="M10 22 Q10 18 18 18 Q26 18 26 22 L29 41 H7 Z" fill="rgba(255,255,255,0.92)"/>
        </svg>
      ) : (
        <svg width={size*0.72} height={size*0.82} viewBox="0 0 36 41" fill="none">
          <ellipse cx="18" cy="10" rx="7" ry="7.5" fill="rgba(255,255,255,0.92)"/>
          <path d="M11 10 Q11 3 18 3 Q25 3 25 10 L25 8 Q18 5 11 8 Z" fill="rgba(255,255,255,0.92)"/>
          <path d="M8 22 Q8 18 18 18 Q28 18 28 22 L27 41 H9 Z" fill="rgba(255,255,255,0.92)"/>
        </svg>
      )}
    </div>
  );
}

// 帖子预览行（模拟时间轴内容，方案共用）
function PostPreview({ authorKey, name, nameColor, text, time, daysTag, isVoice }) {
  return (
    <div style={{ display:'flex', paddingLeft:14, paddingRight:14, marginBottom:10 }}>
      <div style={{ width:18, flexShrink:0, display:'flex', flexDirection:'column', alignItems:'center', paddingTop:2 }}>
        <div style={{ width:7, height:7, borderRadius:'50%', background:C.rose }}/>
        <div style={{ flex:1, width:1.5, background:'#E8E8E8', marginTop:3 }}/>
      </div>
      <div style={{ flex:1, minWidth:0, paddingLeft:8 }}>
        <div style={{ fontSize:11.5, fontWeight:700, color:C.textPri, marginBottom:6, lineHeight:1 }}>{daysTag}</div>
        <div style={{ display:'flex', alignItems:'center', gap:5, marginBottom:4 }}>
          <Ava person={authorKey==='F'?USER:PARTNER} size={18}/>
          <span style={{ fontSize:11.5, fontWeight:600, color:nameColor }}>{name}</span>
          <span style={{ fontSize:10, color:C.textTer, marginLeft:'auto' }}>{time}</span>
        </div>
        <div style={{ background:C.bg, borderRadius:8, padding:'6px 10px' }}>
          {isVoice
            ? <span style={{ fontSize:12, color:C.textTer }}>🎙 语音 18"</span>
            : <div style={{ fontSize:12, color:C.textPri, lineHeight:'18px',
                overflow:'hidden', textOverflow:'ellipsis',
                display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical' }}>{text}</div>}
        </div>
      </div>
    </div>
  );
}

// 查看全部按钮
function ViewAllBtn() {
  return (
    <button style={{ display:'flex', alignItems:'center', justifyContent:'center',
      width:'calc(100% - 28px)', height:40, marginTop:-14, marginLeft:14, marginBottom:12,
      border:`1px solid ${C.line}`, borderRadius:C.rpill, background:C.surface,
      color:C.textSec, fontSize:13, cursor:'pointer', position:'relative', zIndex:2 }}>
      查看全部记录 ›
    </button>
  );
}

// 渐隐蒙层
function FadeMask() {
  return (
    <div style={{ position:'absolute', top:68, left:0, right:0, height:72,
      background:'linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.97) 80%, #fff 100%)',
      pointerEvents:'none', zIndex:1 }}/>
  );
}

// ═══════════════════════════════════════════════════════════════
// 方案 A — 渐变大封面（加高 + 装饰心形 + 居中头像）
// ═══════════════════════════════════════════════════════════════
function OptionA() {
  return (
    <div style={{ background:C.surface, borderRadius:C.rmd, overflow:'hidden', boxShadow:C.shadow1, width:320 }}>
      {/* 封面 */}
      <div style={{ height:100, position:'relative', overflow:'hidden',
        background:'linear-gradient(135deg, #FFD3E2 0%, #FF90BE 50%, #D96FAB 100%)' }}>
        {/* 光晕装饰 */}
        <div style={{ position:'absolute', top:-20, right:-20, width:120, height:120, borderRadius:'50%',
          background:'radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 65%)' }}/>
        <div style={{ position:'absolute', bottom:-30, left:-10, width:90, height:90, borderRadius:'50%',
          background:'radial-gradient(circle, rgba(255,255,255,0.20) 0%, transparent 65%)' }}/>
        {/* 浮动心形 */}
        {[[12,10,16,'rgba(255,255,255,0.55)'],[8,40,70,'rgba(255,255,255,0.4)'],[10,20,55,'rgba(255,255,255,0.45)']].map(([s,t,l,c],i)=>(
          <svg key={i} width={s} height={s} viewBox="0 0 24 24" style={{ position:'absolute', top:t, left:l }}>
            <path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 11c0 5.5-7 10-7 10z" fill={c}/>
          </svg>
        ))}
        {/* 遮罩 */}
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,0.28) 100%)' }}/>
        {/* 情侣信息：居中布局 */}
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', gap:16 }}>
          <div style={{ textAlign:'center' }}>
            <div style={{ width:44, height:44, borderRadius:'50%', overflow:'hidden', border:'2.5px solid rgba(255,255,255,0.9)', margin:'0 auto 4px', boxShadow:'0 2px 8px rgba(0,0,0,0.15)' }}>
              <Ava person={USER} size={44}/>
            </div>

          </div>
          {/* 中间心形 + 天数 */}

            <svg width="22" height="20" viewBox="0 0 24 22">
              <path d="M12 20s-8-5-8-11a5 5 0 0 1 8-4 5 5 0 0 1 8 4c0 6-8 11-8 11z" fill="rgba(255,255,255,0.9)"/>
            </svg>
            <div style={{ fontSize:11, color:'rgba(255,255,255,0.85)', fontWeight:700, marginTop:2 }}>102天</div>
          </div>
          <div style={{ textAlign:'center' }}>
            <div style={{ width:44, height:44, borderRadius:'50%', overflow:'hidden', border:'2.5px solid rgba(255,255,255,0.9)', margin:'0 auto 4px', boxShadow:'0 2px 8px rgba(0,0,0,0.15)' }}>
              <Ava person={PARTNER} size={44}/>
            </div>
            <div style={{ fontSize:10.5, color:'rgba(255,255,255,0.95)', fontWeight:600, textShadow:'0 1px 2px rgba(0,0,0,0.3)' }}>男友先生</div>
          </div>
        </div>
        {/* 右上角标题徽章 */}
        <div style={{ position:'absolute', top:10, right:12,
          background:'rgba(255,255,255,0.22)', backdropFilter:'blur(4px)',
          borderRadius:20, padding:'3px 10px' }}>
          <span style={{ fontSize:11, color:'#fff', fontWeight:600, letterSpacing:0.5 }}>恋爱日记</span>
        </div>
      </div>
      {/* 内容 */}
      <div style={{ position:'relative' }}>
        <div style={{ height:140, overflow:'hidden', paddingTop:10 }}>
          <PostPreview authorKey="F" name="女友殿下" nameColor={C.rose} text="一起走完雁荡山，下山的时候腿都软了 😂 真的好有成就感！" time="21:42" daysTag="第102天"/>
          <PostPreview authorKey="M" name="男友先生" nameColor={C.link} isVoice time="23:08" daysTag="第101天"/>
        </div>
        <FadeMask/>
        <ViewAllBtn/>

    </div>
  );
}

          <PostPreview authorKey="M" name="男友先生" nameColor={C.link} isVoice time="23:08" daysTag="第101天"/>
        </div>
        <FadeMask/>
        <ViewAllBtn/>
      </div>

// ═══════════════════════════════════════════════════════════════
function OptionD() {
  return (
    <div style={{ background:C.surface, borderRadius:C.rmd, overflow:'hidden', boxShadow:C.shadow1, width:320 }}>
      <div style={{ height:92, position:'relative', overflow:'hidden',
        background:'linear-gradient(150deg, #FFE8F0 0%, #FFC8DC 40%, #FFAAC8 100%)' }}>
