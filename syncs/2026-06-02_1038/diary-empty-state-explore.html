<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>恋爱日记空值图探索</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html,body{margin:0;padding:0;height:100%;background:#EDECEA;
    font-family:"PingFang SC","SF Pro Text","Helvetica Neue",Arial,sans-serif;}
  *{box-sizing:border-box;}
  #root{width:100vw;height:100vh;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

const C = {
  red: '#FF4D88',
  redSoft: 'rgba(255,77,136,0.09)',
  redLight: 'rgba(255,77,136,0.15)',
  bg: '#f2f2f5',
  surface: '#ffffff',
  textPri: '#323232',
  textSec: '#666666',
  textTer: '#999999',
  line: 'rgba(0,0,0,0.08)',
  shadow: '0 2px 10px rgba(50,50,50,0.08)',
};

// ── Shared phone shell ──────────────────────────────────────────
function PhoneShell({ children, bg = '#fff' }) {
  return (
    <div style={{
      width: 360, height: 720, borderRadius: 36, overflow: 'hidden',
      position: 'relative', background: bg,
      boxShadow: '0 24px 56px rgba(50,50,50,0.16), 0 0 0 1px rgba(0,0,0,0.08)',
      fontFamily: '"PingFang SC","SF Pro Text","Helvetica Neue",Arial,sans-serif',
    }}>
      {/* status bar */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 20,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '14px 22px 6px', pointerEvents: 'none' }}>
        <span style={{ fontWeight: 600, fontSize: 14, color: '#fff' }}>9:41</span>
        <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
          <svg width="15" height="10" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx="0.5" fill="#fff"/><rect x="4.5" y="5" width="3" height="6" rx="0.5" fill="#fff"/><rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill="#fff"/><rect x="13.5" y="0" width="3" height="11" rx="0.5" fill="#fff"/></svg>
          <svg width="14" height="10" viewBox="0 0 15 11"><path d="M7.5 3a7 7 0 0 1 5.3 2.4l1-1A8.4 8.4 0 0 0 7.5 1 8.4 8.4 0 0 0 1.2 4.4l1 1A7 7 0 0 1 7.5 3z" fill="#fff"/><circle cx="7.5" cy="9" r="1.3" fill="#fff"/></svg>
          <svg width="22" height="11" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" fill="none" stroke="rgba(255,255,255,0.5)"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="#fff"/><rect x="22.5" y="3.5" width="1.5" height="5" rx="0.5" fill="rgba(255,255,255,0.5)"/></svg>
        </div>
      </div>
      <div style={{ position: 'absolute', inset: '36px 0 20px', display: 'flex', flexDirection: 'column' }}>
        {children}
      </div>
      {/* home bar */}
      <div style={{ position: 'absolute', bottom: 5, left: 0, right: 0,
        display: 'flex', justifyContent: 'center', pointerEvents: 'none' }}>
        <div style={{ width: 120, height: 4, borderRadius: 2, background: 'rgba(0,0,0,0.2)' }}/>
      </div>
    </div>
  );
}

// ── Shared diary cover ──────────────────────────────────────────
function DiaryCover({ days = 102, count = 0, gradient = 'linear-gradient(135deg,#FFD3E2 0%,#FFAAC8 45%,#E8A0C0 100%)' }) {
  return (
    <div style={{ height: 220, position: 'relative', overflow: 'hidden', flexShrink: 0,
      background: gradient, marginTop: -36 }}>
      {/* nav back */}
      <div style={{ position: 'absolute', top: 46, left: 14, width: 32, height: 32,
        borderRadius: '50%', background: 'rgba(0,0,0,0.18)',
        display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 5 }}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M15 5l-7 7 7 7" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      {/* shine */}
      <div style={{ position: 'absolute', top: -40, right: -20, width: 160, height: 160,
        borderRadius: '50%', background: 'radial-gradient(circle,rgba(255,255,255,0.28) 0%,transparent 65%)' }}/>
      {/* scrim */}
      <div style={{ position: 'absolute', inset: 0,
        background: 'linear-gradient(to bottom,rgba(0,0,0,0.02) 0%,rgba(0,0,0,0.34) 100%)' }}/>
      {/* couple info */}
      <div style={{ position: 'absolute', bottom: 14, left: 14, right: 14,
        display: 'flex', alignItems: 'flex-end', gap: 10 }}>
        <div style={{ position: 'relative', width: 64, height: 42 }}>
          <div style={{ position: 'absolute', left: 0, top: 2, width: 36, height: 36,
            borderRadius: '50%', background: 'linear-gradient(135deg,#ffb3cc,#ff4d88)',
            border: '2px solid rgba(255,255,255,0.9)', overflow: 'hidden',
            display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="13" r="7" fill="rgba(255,255,255,0.8)"/>
              <path d="M4 30c0-6.627 5.373-12 12-12s12 5.373 12 12" fill="rgba(255,255,255,0.6)"/>
            </svg>
          </div>
          <div style={{ position: 'absolute', right: 0, bottom: 2, width: 36, height: 36,
            borderRadius: '50%', background: 'linear-gradient(135deg,#a8d0ff,#4f7cae)',
            border: '2px solid rgba(255,255,255,0.9)', overflow: 'hidden',
            display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="13" r="7" fill="rgba(255,255,255,0.8)"/>
              <path d="M4 30c0-6.627 5.373-12 12-12s12 5.373 12 12" fill="rgba(255,255,255,0.6)"/>
            </svg>
          </div>
        </div>
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#fff', textShadow: '0 1px 4px rgba(0,0,0,0.35)' }}>
            女友殿下 ❤︎ 男友先生
          </div>
          <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.85)', marginTop: 3, textShadow: '0 1px 3px rgba(0,0,0,0.28)' }}>
            在一起 {days} 天 · 共记 {count} 篇
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// VARIANT A — 时间轴·场景引导
// 沿用时间轴结构，今天节点放大为行动卡，
// 往下两个"幽灵"节点暗示日记的潜力
// ══════════════════════════════════════════════════════
function VariantA() {
  return (
    <PhoneShell>
      <DiaryCover count={0}/>
      {/* scroll area */}
      <div style={{ flex: 1, overflowY: 'auto', background: C.bg, paddingBottom: 16 }}>
        <div style={{ height: 16 }}/>

        {/* 今天节点 — 行动卡 */}
        <div style={{ display: 'flex', padding: '0 14px' }}>
          {/* 时间轴 */}
          <div style={{ width: 18, flexShrink: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 4 }}>
            <div style={{ width: 10, height: 10, borderRadius: '50%', background: C.red, flexShrink: 0, zIndex: 1, boxShadow: `0 0 0 3px ${C.redLight}` }}/>
            <div style={{ flex: 1, width: 1.5, background: '#E0E0E0', marginTop: 4 }}/>
          </div>
          <div style={{ flex: 1, paddingLeft: 10, paddingBottom: 20 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.textPri, marginBottom: 10, lineHeight: 1 }}>
              今天 · 第102天
            </div>
            {/* 场景行动卡 */}
            <div style={{ background: C.surface, borderRadius: 14, overflow: 'hidden', boxShadow: C.shadow }}>
              {/* 插画区 */}
              <div style={{ background: 'linear-gradient(135deg,#FFF0F6 0%,#FFE4EF 100%)', padding: '20px 20px 0', textAlign: 'center' }}>
                {/* SVG couple writing illustration */}
                <svg width="160" height="100" viewBox="0 0 160 100" fill="none">
                  {/* 背景圆 */}
                  <ellipse cx="80" cy="85" rx="68" ry="14" fill="rgba(255,77,136,0.08)"/>
                  {/* 女生 */}
                  <circle cx="55" cy="30" r="14" fill="#FFAAC8"/>
                  <circle cx="55" cy="30" r="11" fill="#FFD3E2"/>
                  <path d="M40 60 Q40 42 55 42 Q70 42 70 60 L70 80 L40 80 Z" fill="#FF80B0"/>
                  {/* 手 + 笔记本 */}
                  <rect x="58" y="58" width="30" height="22" rx="4" fill="#fff" stroke="#FFD3E2" strokeWidth="1.5"/>
                  <line x1="62" y1="65" x2="84" y2="65" stroke="#FFAAC8" strokeWidth="1.2"/>
                  <line x1="62" y1="70" x2="84" y2="70" stroke="#FFAAC8" strokeWidth="1.2"/>
                  <line x1="62" y1="75" x2="76" y2="75" stroke="#FFAAC8" strokeWidth="1.2"/>
                  {/* 爱心 */}
                  <path d="M100 20 C100 16 94 12 94 18 C94 12 88 16 88 20 C88 26 94 30 94 30 C94 30 100 26 100 20Z" fill="#FF4D88" opacity="0.7"/>
                  {/* 男生 */}
                  <circle cx="115" cy="32" r="13" fill="#B8D4FF"/>
                  <circle cx="115" cy="32" r="10" fill="#D4E8FF"/>
                  <path d="M101 60 Q101 44 115 44 Q129 44 129 60 L129 80 L101 80 Z" fill="#7AAEE8"/>
                  {/* 手机 */}
                  <rect x="118" y="56" width="14" height="22" rx="3" fill="#fff" stroke="#B8D4FF" strokeWidth="1.5"/>
                  <rect x="120" y="60" width="10" height="12" rx="1.5" fill="#D4E8FF"/>
                  {/* 连线心 */}
                  <path d="M72 50 Q80 44 95 50" stroke="#FFD3E2" strokeWidth="1.2" strokeDasharray="3 2" fill="none"/>
                </svg>
              </div>
              <div style={{ padding: '14px 16px 16px' }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: C.textPri, marginBottom: 4 }}>
                  在一起第102天，记一笔
                </div>
                <div style={{ fontSize: 12.5, color: C.textSec, lineHeight: '18px', marginBottom: 14 }}>
                  今天发生了什么？一句话、一张照片，都是你们的故事
                </div>
                {/* 快捷入口 */}
                <div style={{ display: 'flex', gap: 8 }}>
                  {[
                    { icon: '✏️', label: '写点什么' },
                    { icon: '📷', label: '上传照片' },
                    { icon: '🎙', label: '语音记录' },
                  ].map(item => (
                    <div key={item.label} style={{
                      flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
                      gap: 4, background: C.redSoft, borderRadius: 10, padding: '8px 4px',
                      cursor: 'pointer',
                    }}>
                      <span style={{ fontSize: 18 }}>{item.icon}</span>
                      <span style={{ fontSize: 11, color: C.red, fontWeight: 500 }}>{item.label}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* 节点 1 — 昨天 */}
        <div style={{ display: 'flex', padding: '0 14px' }}>
          <div style={{ width: 18, flexShrink: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 4 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.red, flexShrink: 0 }}/>
            <div style={{ flex: 1, width: 1.5, background: '#E8E8E8', marginTop: 3 }}/>
          </div>
          <div style={{ flex: 1, paddingLeft: 10, paddingBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.textPri, marginBottom: 8 }}>
              昨天 · 第101天
            </div>
            <div style={{ background: C.surface, borderRadius: 12, padding: '14px 14px',
              boxShadow: C.shadow }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 36, height: 36, borderRadius: 8, background: '#FFF0F6',
                  display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="5" width="18" height="14" rx="2" stroke={C.red} strokeWidth="1.5"/>
                    <circle cx="9" cy="10" r="2" stroke={C.red} strokeWidth="1.5"/>
                    <path d="M3 17l4-4 4 4 3-3 4 4" stroke={C.red} strokeWidth="1.5" strokeLinecap="round"/>
                  </svg>
                </div>
                <div>
                  <div style={{ fontSize: 12.5, color: C.textPri, fontWeight: 500 }}>昨天的故事还没记录</div>
                  <div style={{ fontSize: 11, color: C.textSec, marginTop: 2 }}>现在记录也不迟</div>
                </div>
                <div style={{ marginLeft: 'auto', fontSize: 11, color: C.red, fontWeight: 500,
                  background: C.redSoft, padding: '4px 10px', borderRadius: 99 }}>记录</div>
              </div>
            </div>
          </div>
        </div>

        {/* 节点 2 — 第1天 */}
        <div style={{ display: 'flex', padding: '0 14px' }}>
          <div style={{ width: 18, flexShrink: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 4 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.red, flexShrink: 0 }}/>
          </div>
          <div style={{ flex: 1, paddingLeft: 10 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.textPri, marginBottom: 8 }}>
              纪念日 · 第1天
            </div>
            <div style={{ background: C.surface, borderRadius: 12, padding: '14px 14px',
              boxShadow: C.shadow }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 36, height: 36, borderRadius: 8, background: '#FFF0F6',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>
                  💌
                </div>
                <div>
                  <div style={{ fontSize: 12.5, color: C.textPri, fontWeight: 500 }}>记下你们相识的故事</div>
                  <div style={{ fontSize: 11, color: C.textSec, marginTop: 2 }}>爱的起点值得珍藏</div>
                </div>
                <div style={{ marginLeft: 'auto', fontSize: 11, color: C.red, fontWeight: 500,
                  background: C.redSoft, padding: '4px 10px', borderRadius: 99 }}>记录</div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </PhoneShell>
  );
}

// ══════════════════════════════════════════════════════
// VARIANT B — 场景卡片流（今天+里程碑两张卡）
// 保留时间轴，今天大卡+场景提示+结尾引导写第一天
// ══════════════════════════════════════════════════════
function VariantB() {
  const scenes = [
    {
      day: '今天 · 第102天',
      title: '记下今天的心情',
      desc: '哪怕一句话，也是最真实的你们',
      cta: '开始记录',
      bg: 'linear-gradient(135deg,#FFF0F6,#FFE0EE)',
      dot: C.red,
      IllustEl: () => (
        <svg width="80" height="72" viewBox="0 0 80 72" fill="none">
          <circle cx="40" cy="28" r="24" fill="rgba(255,77,136,0.12)"/>
          {/* 心形 */}
          <path d="M40 44 C40 44 22 34 22 23 C22 16 28 12 34 16 C36 17 38 20 40 22 C42 20 44 17 46 16 C52 12 58 16 58 23 C58 34 40 44 40 44Z" fill="#FF4D88" opacity="0.85"/>
          {/* 笔记本 */}
          <rect x="26" y="46" width="28" height="20" rx="4" fill="#fff" stroke="#FFD3E2" strokeWidth="1.2"/>
          <line x1="30" y1="53" x2="50" y2="53" stroke="#FFAAC8" strokeWidth="1.1"/>
          <line x1="30" y1="58" x2="50" y2="58" stroke="#FFAAC8" strokeWidth="1.1"/>
          <line x1="30" y1="63" x2="42" y2="63" stroke="#FFAAC8" strokeWidth="1.1"/>
          {/* 小星星 */}
          <circle cx="62" cy="18" r="2" fill="#FFD3E2"/>
          <circle cx="16" cy="22" r="1.5" fill="#FFB3CC"/>
          <circle cx="66" cy="36" r="1.2" fill="#FF80B0"/>
        </svg>
      ),
    },
    {
      day: '第一张合照',
      title: '上传你们的合照',
      desc: '每一张照片都是回忆的锚点',
      cta: '选择照片',
      bg: 'linear-gradient(135deg,#F0F7FF,#E0EEFF)',
      dot: '#4F7CAE',
      IllustEl: () => (
        <svg width="80" height="72" viewBox="0 0 80 72" fill="none">
          <circle cx="40" cy="32" r="24" fill="rgba(79,124,174,0.1)"/>
          {/* 相框 */}
          <rect x="18" y="16" width="44" height="36" rx="5" fill="#fff" stroke="#B8D4FF" strokeWidth="1.5"/>
          {/* 照片内容 — 两个人 */}
          <rect x="21" y="19" width="38" height="27" rx="3" fill="#EEF5FF"/>
          <circle cx="33" cy="28" r="6" fill="#FFD3E2"/>
          <path d="M22 44 Q33 36 33 34" stroke="#FFAAC8" strokeWidth="1" fill="none"/>
          <circle cx="48" cy="28" r="6" fill="#B8D4FF"/>
          <path d="M57 44 Q48 36 48 34" stroke="#9EC4F0" strokeWidth="1" fill="none"/>
          {/* 爱心 */}
          <path d="M40.5 29.5 C40.5 29.5 38 27 38 25.5 C38 24 39.2 23 40.5 24.5 C41.8 23 43 24 43 25.5 C43 27 40.5 29.5 40.5 29.5Z" fill="#FF4D88" opacity="0.8"/>
          {/* 相机按钮 */}
          <circle cx="56" cy="48" r="7" fill="#4F7CAE"/>
          <rect x="52.5" y="45.5" width="7" height="5" rx="1.2" fill="#fff" opacity="0.9"/>
          <circle cx="56" cy="48" r="1.5" fill="#4F7CAE"/>
        </svg>
      ),
    },
    {
      day: '相识那天 · 第1天',
      title: '记下你们相遇的故事',
      desc: '爱的起点，最值得被珍藏',
      cta: '补记第一天',
      bg: 'linear-gradient(135deg,#FFF8E8,#FFF0C8)',
      dot: '#F0A020',
      IllustEl: () => (
        <svg width="80" height="72" viewBox="0 0 80 72" fill="none">
          <circle cx="40" cy="32" r="24" fill="rgba(240,160,32,0.1)"/>
          {/* 信封 */}
          <rect x="16" y="22" width="48" height="32" rx="5" fill="#fff" stroke="#FFD580" strokeWidth="1.5"/>
          <path d="M16 26 L40 40 L64 26" stroke="#FFD580" strokeWidth="1.5" fill="none"/>
          {/* 心 */}
          <path d="M40 37 C40 37 35 33 35 30 C35 27.5 37 26 39 28 C39.5 28.5 40 29 40 29 C40 29 40.5 28.5 41 28 C43 26 45 27.5 45 30 C45 33 40 37 40 37Z" fill="#FF4D88" opacity="0.8"/>
          {/* 小信件 */}
          <line x1="25" y1="36" x2="35" y2="36" stroke="#FFE0A0" strokeWidth="1.2"/>
          <line x1="25" y1="40" x2="33" y2="40" stroke="#FFE0A0" strokeWidth="1.2"/>
          <line x1="48" y1="36" x2="54" y2="36" stroke="#FFE0A0" strokeWidth="1.2"/>
          <line x1="48" y1="40" x2="54" y2="40" stroke="#FFE0A0" strokeWidth="1.2"/>
          {/* 星星 */}
          <path d="M66 18l1 3 3 0-2.4 1.8.9 3-2.5-1.6-2.5 1.6.9-3L63 21l3 0z" fill="#FFD040" opacity="0.8"/>
          <path d="M14 14l0.7 2 2 0-1.6 1.2.6 2-1.7-1.1-1.7 1.1.6-2-1.6-1.2 2 0z" fill="#FFD040" opacity="0.6"/>
        </svg>
      ),
    },
  ];

  return (
    <PhoneShell>
      <DiaryCover count={0} gradient="linear-gradient(135deg,#D4EAFF 0%,#A8CFFF 45%,#8AB8F0 100%)"/>
      <div style={{ flex: 1, overflowY: 'auto', background: C.bg, paddingBottom: 16 }}>
        <div style={{ height: 16 }}/>
        {scenes.map((s, idx) => (
          <div key={idx} style={{ display: 'flex', padding: '0 14px', marginBottom: idx < scenes.length - 1 ? 0 : 0 }}>
            {/* 时间轴 */}
            <div style={{ width: 18, flexShrink: 0, display: 'flex', flexDirection: 'column',
              alignItems: 'center', paddingTop: 4 }}>
              <div style={{ width: idx === 0 ? 10 : 8, height: idx === 0 ? 10 : 8,
                borderRadius: '50%', background: idx === 0 ? s.dot : '#D0D0D0', flexShrink: 0,
                boxShadow: idx === 0 ? `0 0 0 3px ${C.redLight}` : 'none' }}/>
              {idx < scenes.length - 1 && (
                <div style={{ flex: 1, width: 1.5, background: idx === 0 ? '#E8E8E8' : '#EBEBEB',
                  marginTop: 4, minHeight: 20 }}/>
              )}
            </div>
            {/* 内容 */}
            <div style={{ flex: 1, paddingLeft: 10, paddingBottom: 16 }}>
              <div style={{ fontSize: idx === 0 ? 13 : 12, fontWeight: 700,
                color: idx === 0 ? C.textPri : C.textTer, marginBottom: 8, lineHeight: 1 }}>
                {s.day}
              </div>
              <div style={{ background: idx === 0 ? C.surface : '#FAFAFA',
                borderRadius: 14, overflow: 'hidden',
                border: idx === 0 ? 'none' : '1.5px dashed #E0E0E0',
                boxShadow: idx === 0 ? C.shadow : 'none' }}>
                <div style={{ background: s.bg, display: 'flex', alignItems: 'center',
                  justifyContent: 'center', padding: idx === 0 ? '18px 0 12px' : '12px 0 8px' }}>
                  <s.IllustEl/>
                </div>

        <div style={{ position: 'absolute', top: 88, left: 0, right: 0, height: 60,
          background: 'linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.96) 85%, #fff 100%)',
          pointerEvents: 'none', zIndex: 1 }}/>
      </div>
      <button style={{ display: 'flex', alignItems: 'center', justifyContent: 'center',
        width: '100%', height: 38, borderRadius: 999, marginTop: 8,
        border: `1px solid ${C.line}`, background: C.surface,
        color: C.textSec, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit',
      }}>查看全部记录 ›</button>
    </div>
  );
}

function StripA() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 6,
      background: C.bg, borderRadius: 22, padding: '7px 10px 7px 12px',
      border: `1px solid ${C.line}`, cursor: 'text' }}>
      <MiniAva person={AVA_F} size={22}/>
      <span style={{ flex: 1, fontSize: 13, color: C.textTer }}>记录今天的故事…</span>
      <div style={{ width: 30, height: 30, borderRadius: '50%', background: C.redSoft,
        display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M12 20V4M4 12l8-8 8 8" stroke={C.red} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
    </div>
  );
}

function StripB() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center',
      gap: 6, background: C.redSoft, borderRadius: 10, padding: '9px 14px',
      cursor: 'pointer', border: `1px solid rgba(255,77,136,0.15)`, marginBottom: 2 }}>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
        <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
          stroke={C.red} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      <span style={{ fontSize: 13, fontWeight: 600, color: C.red }}>写下今天的故事</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ marginLeft: 2 }}>
        <path d="M9 18l6-6-6-6" stroke={C.red} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </div>
  );
}

function StripC() {
  return (
    <div style={{ display: 'flex', marginTop: 4 }}>
      <div style={{ width: 18, flexShrink: 0, display: 'flex', flexDirection: 'column',
        alignItems: 'center', paddingTop: 0 }}>
        <div style={{ width: 1.5, height: 8, background: '#E8E8E8' }}/>
        <div style={{ width: 8, height: 8, borderRadius: '50%',
          border: `1.5px dashed ${C.red}`, background: 'transparent', flexShrink: 0 }}/>
      </div>
      <div style={{ flex: 1, paddingLeft: 8 }}>
        <div style={{ background: C.bg, borderRadius: 10, padding: '8px 12px',
          border: `1.5px dashed rgba(255,77,136,0.35)`,
          display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
          <span style={{ fontSize: 12.5, color: C.textTer, flex: 1 }}>今天还没有记录，写一笔？</span>
          <div style={{ display: 'flex', gap: 6 }}>
            {['✏️','📷','🎙'].map(icon => (
              <div key={icon} style={{ width: 26, height: 26, borderRadius: '50%',
                background: C.surface, display: 'flex', alignItems: 'center',
                justifyContent: 'center', fontSize: 13, boxShadow: '0 1px 4px rgba(0,0,0,0.08)' }}>
                {icon}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main canvas ─────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas>
      <DCSection id="empty-state" title="恋爱日记 · 全部记录 — 空值图探索"
        subtitle="0条记录时的引导态 — 时间轴格式 + 场景化 CTA">
        <DCArtboard id="va" label="A · 时间轴 + 场景行动卡" width={360} height={720}>
          <VariantA/>
        </DCArtboard>
        <DCArtboard id="vb" label="B · 今天大卡 + 里程碑幽灵节点" width={360} height={720}>
          <VariantB/>
        </DCArtboard>
        <DCArtboard id="vc" label="C · 情感大图 + 时间轴提示" width={360} height={720}>
          <VariantC/>
        </DCArtboard>
      </DCSection>
      <DCSection id="home-module" title="恋爱日记 · 首页模块 — 空值图探索"
        subtitle="首页卡片内的引导态，嵌入在主页中">
        <DCArtboard id="hma" label="A · 小插画 + 单CTA" width={360} height={540}>
          <HomeCtx DiaryCard={HMA}/>
        </DCArtboard>
        <DCArtboard id="hmb" label="B · 横向三场景快捷入口" width={360} height={540}>
          <HomeCtx DiaryCard={() => <HMB onViewAll={() => {}}/>}/>
        </DCArtboard>
        <DCArtboard id="hmc" label="C · 迷你时间轴首条引导" width={360} height={540}>
          <HomeCtx DiaryCard={HMC}/>
        </DCArtboard>
      </DCSection>
      <DCSection id="guide-strip" title="恋爱日记 · 首页模块 — 引导条探索"
        subtitle="今天·第102天节点下方内联引导条，B方案：横向引导胶囊">
        <DCArtboard id="gsb" label="B · 横向引导胶囊（今天节点下方）" width={360} height={540}>
          <HomeCtx DiaryCard={() => <DiaryModuleWithStrip GuideStrip={StripB}/>}/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
