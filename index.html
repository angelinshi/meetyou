<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>Meetyou · 设计导航</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#ff4d88;
  --red-soft:rgba(255,77,136,0.09);
  --bg:#f0eff4;
  --surface:#fff;
  --text-pri:#323232;
  --text-sec:#666;
  --text-ter:#999;
  --line:rgba(0,0,0,0.07);
  --sw:228px;
}
html,body{height:100%;overflow:hidden;
  font-family:"PingFang SC","SF Pro Text","Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;background:var(--bg);}

.layout{display:flex;height:100vh;}

/* ── sidebar ── */
.sidebar{
  width:var(--sw);flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.brand{
  padding:18px 18px 14px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--line);flex-shrink:0;
}
.brand-logo{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#ff4d88,#ff8475);
  display:flex;align-items:center;justify-content:center;
}
.brand-logo svg{display:block;}
.brand-name{font-size:15px;font-weight:600;color:var(--text-pri);}
.brand-tag{font-size:11px;color:var(--text-ter);margin-top:1px;}

.nav-section{
  font-size:10.5px;font-weight:600;letter-spacing:.06em;
  color:var(--text-ter);text-transform:uppercase;
  padding:18px 18px 7px;
}

.nav-list{flex:1;overflow-y:auto;padding:0 10px 20px;}
.nav-list::-webkit-scrollbar{display:none;}

.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 10px;border-radius:10px;
  cursor:pointer;margin-bottom:2px;
  transition:background .13s;
  user-select:none;
}
.nav-item:hover{background:var(--bg);}
.nav-item.active{background:var(--red-soft);}
.nav-item.active .nav-title{color:var(--red);}
.nav-item.active .nav-num{color:var(--red);}

.nav-icon{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
}
.nav-meta{flex:1;min-width:0;}
.nav-num{font-size:10px;font-weight:600;color:var(--text-ter);margin-bottom:1px;}
.nav-title{font-size:13px;font-weight:500;color:var(--text-pri);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-file{font-size:10px;color:var(--text-ter);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── content ── */
.content{flex:1;overflow:hidden;position:relative;background:var(--bg);}

.welcome{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  color:var(--text-ter);
  transition:opacity .2s;
}
.welcome-icon{
  width:64px;height:64px;border-radius:20px;
  background:linear-gradient(135deg,#ff4d88,#ff8475);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 28px rgba(255,77,136,0.28);
}
.welcome-icon svg{display:block;}
.welcome h2{font-size:18px;font-weight:600;color:var(--text-sec);}
.welcome p{font-size:13px;color:var(--text-ter);}

#preview{
  position:absolute;inset:0;width:100%;height:100%;
  border:none;background:#fff;
  opacity:0;transition:opacity .18s;
}
#preview.visible{opacity:1;}

/* loading bar */
.loader{
  position:absolute;top:0;left:0;right:0;height:2.5px;
  background:var(--line);overflow:hidden;z-index:5;
  opacity:0;transition:opacity .15s;
}
.loader.active{opacity:1;}
.loader-bar{
  height:100%;width:0;
  background:var(--red);
  border-radius:0 2px 2px 0;
  transition:width .3s ease;
}
</style>
</head>
<body>

<div class="layout">
  <!-- sidebar -->
  <div class="sidebar">
    <div class="brand">
      <div class="brand-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 21C6.5 15.5 2 11.5 2 7.5 2 4.42 4.42 2 7.5 2c1.74 0 3.41.81 4.5 2.09C13.09 2.81 14.76 2 16.5 2 19.58 2 22 4.42 22 7.5c0 4-4.5 8-10 13.5z" fill="#fff"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Meetyou</div>
        <div class="brand-tag">男友版 设计导航</div>
      </div>
    </div>

    <div class="nav-section">页面</div>
    <div class="nav-list" id="navList"></div>
  </div>

  <!-- content -->
  <div class="content" id="content">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 21C6.5 15.5 2 11.5 2 7.5 2 4.42 4.42 2 7.5 2c1.74 0 3.41.81 4.5 2.09C13.09 2.81 14.76 2 16.5 2 19.58 2 22 4.42 22 7.5c0 4-4.5 8-10 13.5z" fill="#fff"/>
        </svg>
      </div>
      <h2>选择左侧页面查看</h2>
      <p>点击导航项在右侧预览</p>
    </div>
    <div class="loader" id="loader"><div class="loader-bar" id="loaderBar"></div></div>
    <iframe id="preview" title="preview" allowfullscreen></iframe>
  </div>
</div>

<script>
const PAGES = [
  { num:'01', icon:'🗂️', iconBg:'rgba(255,77,136,0.08)',
    title:'男友版页面流程图', file:'Meetyou_boyfriend_v3.html' },
  { num:'02', icon:'📱', iconBg:'rgba(74,122,175,0.10)',
    title:'男友版交互稿', file:'Meetyou_Interactive_v3.html' },
  { num:'03', icon:'☁️', iconBg:'rgba(255,149,0,0.09)',
    title:'女生视角首页-有天气&胶囊入口', file:'girl_home_v3.html' },
  { num:'04', icon:'🏠', iconBg:'rgba(255,77,136,0.08)',
    title:'女生视角首页-无天气&模块入口', file:'girl_home_compare.html' },
  { num:'05', icon:'📖', iconBg:'rgba(0,204,153,0.09)',
    title:'女生视角恋爱记页面', file:'Meetyou_diary_v6.html' },
];

const navList = document.getElementById('navList');
const preview = document.getElementById('preview');
const welcome = document.getElementById('welcome');
const loader  = document.getElementById('loader');
const loaderBar = document.getElementById('loaderBar');
let activeIdx = -1;

PAGES.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'nav-item';
  el.innerHTML = `
    <div class="nav-icon" style="background:${p.iconBg}">${p.icon}</div>
    <div class="nav-meta">
      <div class="nav-num">${p.num}</div>
      <div class="nav-title">${p.title}</div>
      <div class="nav-file">${p.file}</div>
    </div>`;
  el.addEventListener('click', () => load(i, el));
  navList.appendChild(el);
});

function load(i, el) {
  if (activeIdx === i) return;
  activeIdx = i;
  // update active state
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  // hide iframe, show loader
  preview.classList.remove('visible');
  welcome.style.opacity = '0';
  loader.classList.add('active');
  loaderBar.style.width = '40%';
  // load
  preview.src = PAGES[i].file;
  preview.onload = () => {
    loaderBar.style.width = '100%';
    setTimeout(() => {
      loader.classList.remove('active');
      loaderBar.style.width = '0';
      preview.classList.add('visible');
    }, 200);
  };
}
</script>
</body>
</html>
