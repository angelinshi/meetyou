<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F2F0EC;font-family:"PingFang SC",-apple-system,sans-serif;padding:32px 40px;}
h2{font-size:13px;font-weight:600;color:#888;margin-bottom:24px;letter-spacing:1px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.card{background:#fff;border-radius:16px;padding:24px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.card-title{font-size:12px;font-weight:600;color:#333;margin-bottom:4px;}
.card-desc{font-size:10.5px;color:#aaa;margin-bottom:16px;line-height:15px;}
.avatars{display:flex;gap:18px;align-items:flex-end;}
.col{display:flex;flex-direction:column;align-items:center;gap:5px;}
.ava{border-radius:50%;overflow:hidden;flex-shrink:0;}
.lbl{font-size:9.5px;color:#bbb;font-weight:500;}
</style>
</head>
<body>
<h2>AVATAR 占位符 · 新方案</h2>
<div class="grid">

<!-- 方案E：Q版圆脸，有表情 -->
<div class="card">
  <div class="card-title">方案 E · Q 版圆脸，有五官</div>
  <div class="card-desc">大眼睛 + 小嘴 + 发型，类贴纸风，亲切可爱</div>
  <div class="avatars">
    <!-- 女生 Q版 -->
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:linear-gradient(145deg,#FFE0EC,#FFB8D0);display:flex;align-items:center;justify-content:center;">
        <svg width="50" height="54" viewBox="0 0 50 54" fill="none">
          <!-- 头发背景 -->
          <ellipse cx="25" cy="13" rx="14" ry="10" fill="#FF9CBD"/>
          <!-- 耳朵 -->
          <ellipse cx="11" cy="18" rx="3.5" ry="4.5" fill="#FFCCE0"/>
          <ellipse cx="39" cy="18" rx="3.5" ry="4.5" fill="#FFCCE0"/>
          <!-- 脸 -->
          <ellipse cx="25" cy="20" rx="12" ry="12.5" fill="#FFEEF5"/>
          <!-- 刘海 -->
          <path d="M13 14 Q14 9 25 9 Q36 9 37 14" fill="#FF9CBD"/>
          <ellipse cx="18" cy="12.5" rx="4" ry="3.5" fill="#FF9CBD"/>
          <ellipse cx="32" cy="12.5" rx="4" ry="3.5" fill="#FF9CBD"/>
          <!-- 眼睛 -->
          <ellipse cx="20" cy="19" rx="2.5" ry="2.8" fill="#3D2B2B"/>
          <ellipse cx="30" cy="19" rx="2.5" ry="2.8" fill="#3D2B2B"/>
          <ellipse cx="20.8" cy="17.8" rx="0.9" ry="0.9" fill="#fff"/>
          <ellipse cx="30.8" cy="17.8" rx="0.9" ry="0.9" fill="#fff"/>
          <!-- 腮红 -->
          <ellipse cx="17" cy="22" rx="3" ry="1.8" fill="rgba(255,100,140,0.2)"/>
          <ellipse cx="33" cy="22" rx="3" ry="1.8" fill="rgba(255,100,140,0.2)"/>
          <!-- 嘴 -->
          <path d="M21.5 25.5 Q25 28 28.5 25.5" stroke="#FF8FB0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <!-- 身体 -->
          <path d="M12 54 Q12 34 25 34 Q38 34 38 54" fill="#FFB8D0"/>
        </svg>
      </div>
      <div class="lbl">女生</div>
    </div>
    <!-- 男生 Q版 -->
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:linear-gradient(145deg,#DCE8FF,#A8C4F0);display:flex;align-items:center;justify-content:center;">
        <svg width="50" height="54" viewBox="0 0 50 54" fill="none">
          <!-- 头发 -->
          <ellipse cx="25" cy="12" rx="13" ry="9" fill="#6090D0"/>
          <ellipse cx="11" cy="18" rx="3.5" ry="4.5" fill="#C0D8F8"/>
          <ellipse cx="39" cy="18" rx="3.5" ry="4.5" fill="#C0D8F8"/>
          <!-- 脸 -->
          <ellipse cx="25" cy="20" rx="12" ry="12.5" fill="#E8F2FF"/>
          <!-- 短发盖住额头 -->
          <path d="M13 14 Q13 8 25 8 Q37 8 37 14 Q37 10 25 9.5 Q13 10 13 14" fill="#6090D0"/>
          <!-- 眼睛 -->
          <ellipse cx="20" cy="19" rx="2.5" ry="2.5" fill="#2B3A4D"/>
          <ellipse cx="30" cy="19" rx="2.5" ry="2.5" fill="#2B3A4D"/>
          <ellipse cx="20.8" cy="17.8" rx="0.9" ry="0.9" fill="#fff"/>
          <ellipse cx="30.8" cy="17.8" rx="0.9" ry="0.9" fill="#fff"/>
          <!-- 嘴 -->
          <path d="M22 25.5 Q25 27.5 28 25.5" stroke="#90B0D0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <!-- 身体 -->
          <path d="M12 54 Q12 34 25 34 Q38 34 38 54" fill="#90B8E8"/>
        </svg>
      </div>
      <div class="lbl">男生</div>
    </div>
    <!-- 未邀请 Q版 -->
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:linear-gradient(145deg,#ECEAF4,#D8D4EC);display:flex;align-items:center;justify-content:center;">
        <svg width="50" height="54" viewBox="0 0 50 54" fill="none">
          <ellipse cx="11" cy="18" rx="3.5" ry="4.5" fill="#D8D4EC"/>
          <ellipse cx="39" cy="18" rx="3.5" ry="4.5" fill="#D8D4EC"/>
          <ellipse cx="25" cy="20" rx="12" ry="12.5" fill="#EEE8FA"/>
          <ellipse cx="25" cy="12" rx="13" ry="9" fill="#C8C4E0"/>
          <path d="M13 14 Q13 8 25 8 Q37 8 37 14 Q37 10 25 9.5 Q13 10 13 14" fill="#B8B4D8"/>
          <!-- 眼睛用圆圈替代 -->
          <circle cx="20" cy="19.5" r="2.5" fill="none" stroke="#B0A8D0" stroke-width="1.5"/>
          <circle cx="30" cy="19.5" r="2.5" fill="none" stroke="#B0A8D0" stroke-width="1.5"/>
          <!-- 问号嘴 -->
          <text x="25" y="27" text-anchor="middle" font-size="6" fill="#C0B8DC" font-weight="700">?</text>
          <path d="M12 54 Q12 34 25 34 Q38 34 38 54" fill="#C8C4E0"/>
        </svg>
      </div>
      <div class="lbl">未邀请</div>
    </div>
  </div>
</div>

<!-- 方案F：极简线条 + 柔色，图标感 -->
<div class="card">
  <div class="card-title">方案 F · 极简图标感，线条柔和</div>
  <div class="card-desc">描边线稿 + 柔和填色，介于图标与插画之间</div>
  <div class="avatars">
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:#FFF5F8;display:flex;align-items:center;justify-content:center;">
        <svg width="44" height="48" viewBox="0 0 44 48" fill="none">
          <circle cx="22" cy="14" r="10" fill="#FFE4EF" stroke="#FF8FB0" stroke-width="1.5"/>
          <!-- 发型弧 -->
          <path d="M12 14 Q12 6 22 6 Q32 6 32 14" fill="#FFB5CE" stroke="none"/>
          <ellipse cx="14" cy="11" rx="3.5" ry="5" fill="#FFB5CE"/>
          <ellipse cx="30" cy="11" rx="3.5" ry="5" fill="#FFB5CE"/>
          <!-- 身体 -->
          <path d="M8 48 Q8 30 22 30 Q36 30 36 48" fill="#FFD0E4" stroke="#FF8FB0" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- 领口 -->
          <path d="M17 31 Q22 35 27 31" stroke="#FF8FB0" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="lbl">女生</div>
    </div>
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:#F0F6FF;display:flex;align-items:center;justify-content:center;">
        <svg width="44" height="48" viewBox="0 0 44 48" fill="none">
          <circle cx="22" cy="14" r="10" fill="#D8E8FF" stroke="#6090D0" stroke-width="1.5"/>
          <!-- 发型 -->
          <path d="M12 14 Q12 6 22 6 Q32 6 32 14 Q32 9 22 8.5 Q12 9 12 14" fill="#90B8E8"/>
          <!-- 身体 -->
          <path d="M8 48 Q8 30 22 30 Q36 30 36 48" fill="#B8D4FF" stroke="#6090D0" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- V领 -->
          <path d="M17 31 L22 36 L27 31" stroke="#6090D0" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="lbl">男生</div>
    </div>
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:#F6F4FC;display:flex;align-items:center;justify-content:center;">
        <svg width="44" height="48" viewBox="0 0 44 48" fill="none">
          <circle cx="22" cy="14" r="10" fill="none" stroke="#C0B8E0" stroke-width="1.5" stroke-dasharray="5 3"/>
          <path d="M8 48 Q8 30 22 30 Q36 30 36 48" fill="none" stroke="#C0B8E0" stroke-width="1.5" stroke-dasharray="5 3"/>
          <!-- 邀请图标居中 -->
          <circle cx="22" cy="24" r="8" fill="#FF4D88" opacity="0.9"/>
          <line x1="22" y1="20.5" x2="22" y2="27.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <line x1="18.5" y1="24" x2="25.5" y2="24" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="lbl">待邀请</div>
    </div>
  </div>
</div>

<!-- 方案G：大头像，纯色块 iOS 风 -->
<div class="card">
  <div class="card-title">方案 G · 纯色几何，现代 iOS 风</div>
  <div class="card-desc">色块组合，无描边，干净利落，接近系统默认头像</div>
  <div class="avatars">
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:#FFAFC8;display:flex;align-items:center;justify-content:center;">
        <svg width="50" height="54" viewBox="0 0 50 54" fill="none">
          <!-- 头 -->
          <circle cx="25" cy="17" r="12" fill="rgba(255,255,255,0.96)"/>
          <!-- 发 -->
          <path d="M13 17 Q13 7 25 7 Q37 7 37 17 Q37 11 25 10 Q13 11 13 17" fill="rgba(255,255,255,0.5)"/>
          <!-- 身 -->
          <path d="M5 54 Q5 32 25 32 Q45 32 45 54" fill="rgba(255,255,255,0.96)"/>
        </svg>
      </div>
      <div class="lbl">女生</div>
    </div>
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:#5B9CF6;display:flex;align-items:center;justify-content:center;">
        <svg width="50" height="54" viewBox="0 0 50 54" fill="none">
          <circle cx="25" cy="17" r="12" fill="rgba(255,255,255,0.96)"/>
          <path d="M13 17 Q13 7.5 25 7.5 Q37 7.5 37 17 Q37 12 25 11.5 Q13 12 13 17" fill="rgba(255,255,255,0.4)"/>
          <path d="M5 54 Q5 32 25 32 Q45 32 45 54" fill="rgba(255,255,255,0.96)"/>
        </svg>
      </div>
      <div class="lbl">男生</div>
    </div>
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:#E0DCF0;display:flex;align-items:center;justify-content:center;">
        <svg width="50" height="54" viewBox="0 0 50 54" fill="none">
          <circle cx="25" cy="17" r="12" fill="rgba(255,255,255,0.55)"/>
          <path d="M5 54 Q5 32 25 32 Q45 32 45 54" fill="rgba(255,255,255,0.45)"/>
          <circle cx="35" cy="35" r="9" fill="#FF4D88"/>
          <line x1="35" y1="31" x2="35" y2="39" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="31" y1="35" x2="39" y2="35" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="lbl">未邀请</div>
    </div>
  </div>
</div>

<!-- 方案H：毛绒质感，柔软感十足 -->
<div class="card">
  <div class="card-title">方案 H · 柔软圆润，像棉花一样</div>
  <div class="card-desc">多层圆形叠加，有蓬松感，整体更圆润温柔</div>
  <div class="avatars">
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:linear-gradient(145deg,#FFD8E8,#FFC0D8);display:flex;align-items:center;justify-content:center;">
        <svg width="52" height="56" viewBox="0 0 52 56" fill="none">
          <!-- 发型蓬松感：多个圆叠加 -->
          <circle cx="26" cy="10" r="8" fill="#FF9CC0"/>
          <circle cx="16" cy="13" r="6.5" fill="#FFA8C8"/>
          <circle cx="36" cy="13" r="6.5" fill="#FFA8C8"/>
          <circle cx="12" cy="19" r="5" fill="#FFB5CE"/>
          <circle cx="40" cy="19" r="5" fill="#FFB5CE"/>
          <!-- 脸 -->
          <circle cx="26" cy="21" r="11" fill="#FFF0F6"/>
          <!-- 身体（蓬松裙摆感） -->
          <ellipse cx="26" cy="44" rx="17" ry="12" fill="#FFB5CE"/>
          <ellipse cx="26" cy="36" rx="10" ry="8" fill="#FFC8DA"/>
          <!-- 颈 -->
          <rect x="23" y="32" width="6" height="5" rx="3" fill="#FFF0F6"/>
        </svg>
      </div>
      <div class="lbl">女生</div>
    </div>
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:linear-gradient(145deg,#C8DCFF,#A0C0F0);display:flex;align-items:center;justify-content:center;">
        <svg width="52" height="56" viewBox="0 0 52 56" fill="none">
          <!-- 发型简洁 -->
          <ellipse cx="26" cy="12" rx="12" ry="8" fill="#5C8FD0"/>
          <circle cx="14" cy="16" r="5" fill="#6898D8"/>
          <circle cx="38" cy="16" r="5" fill="#6898D8"/>
          <!-- 脸 -->
          <circle cx="26" cy="21" r="11" fill="#E0EEFF"/>
          <!-- 身体 -->
          <ellipse cx="26" cy="44" rx="15" ry="12" fill="#90B8E8"/>
          <ellipse cx="26" cy="36" rx="9" ry="7" fill="#A0C4F0"/>
          <rect x="23" y="32" width="6" height="5" rx="3" fill="#E0EEFF"/>
        </svg>
      </div>
      <div class="lbl">男生</div>
    </div>
    <div class="col">
      <div class="ava" style="width:68px;height:68px;background:linear-gradient(145deg,#ECEAF6,#D8D4F0);display:flex;align-items:center;justify-content:center;">
        <svg width="52" height="56" viewBox="0 0 52 56" fill="none">
          <circle cx="26" cy="10" r="8" fill="rgba(190,185,225,0.5)"/>
          <circle cx="16" cy="13" r="6.5" fill="rgba(195,190,230,0.45)"/>
          <circle cx="36" cy="13" r="6.5" fill="rgba(195,190,230,0.45)"/>
          <circle cx="26" cy="21" r="11" fill="rgba(220,215,245,0.7)"/>
          <ellipse cx="26" cy="44" rx="17" ry="12" fill="rgba(195,190,230,0.5)"/>
          <ellipse cx="26" cy="36" rx="10" ry="8" fill="rgba(210,205,240,0.55)"/>
          <!-- 加号 -->
          <circle cx="37" cy="34" r="8" fill="#FF4D88"/>
          <line x1="37" y1="30.5" x2="37" y2="37.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="33.5" y1="34" x2="40.5" y2="34" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="lbl">待邀请</div>
    </div>
  </div>
</div>

</div>
</body>
</html>
