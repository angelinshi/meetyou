<div id="root"></div>
<script type="text/babel">

const ff = '"PingFang SC","SF Pro Text","Helvetica Neue",Arial,sans-serif';
const T = {

/* shared Phone */

const HomeInd = ({dark=false}) => (
  <div style={{height:34,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
    <div style={{width:134,height:5,borderRadius:3,background: dark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.18)'}}/>
  </div>
);

/* ============================================================
   A: 晒衣绳 Clothesline
============================================================ */
const Clothesline = () => {
  const items = [
    {left:12,  top:40, rotate:-3, w:118, h:138, type:'photo', caption:'第一次约会 📷', gradFrom:'#fde8ef', gradTo:'#f5e0fd'},
    {left:136, top:20, rotate:2,  w:102, h:102, type:'note',  text:'你笑起来\n真好看', color:'#fffae8'},
    {left:244, top:35, rotate:-2, w:114, h:132, type:'photo', caption:'生日快乐 🎂',  gradFrom:'#e0edff', gradTo:'#d8f5ec'},
    {left:12,  top:230,rotate:3,  w:108, h:108, type:'note',  text:'第102次想你 🩷', color:'#fff0f5'},
    {left:136, top:240,rotate:-1, w:116, h:128, type:'photo', caption:'一起看海 🌊',  gradFrom:'#d8eeff', gradTo:'#e8f0ff'},

    <Phone bg="#faf6f0">

        <div style={{flex:1,textAlign:'center',fontSize:17,fontWeight:500,color:'#4a3020'}}>回忆晒衣绳</div>
        <div style={{width:44,textAlign:'right',fontSize:20,color:'#8a6050'}}>⋯</div>
      </div>
      {/* Month strip */}
      <div style={{display:'flex',background:'#f5efe5',borderBottom:'1px solid #e0d0c0',flexShrink:0}}>
        {['11月','12月','1月','2月','3月','4月','5月','6月'].map((m,i)=>(
          <div key={i} style={{flex:1,padding:'7px 0',textAlign:'center',fontSize:11,
            color: i===7?T.brand:T.t,
            borderBottom: i===7?`2px solid ${T.brand}`:'2px solid transparent',
            fontWeight: i===7?500:400,
          }}>{m}</div>
        ))}
      </div>

      {/* Cork board + rope */}
      <div style={{flex:1,position:'relative',overflow:'hidden',background:'#f5ede0',
        backgroundImage:'radial-gradient(circle,rgba(0,0,0,0.04) 1px,transparent 1px)',
        backgroundSize:'22px 22px',
      }}>
        {/* Rope 1 */}
        <div style={{position:'absolute',top:78,left:-8,right:-8,height:3,
          background:'linear-gradient(90deg,#c8a870,#a88050,#c8a870)',
          borderRadius:2,boxShadow:'0 1px 5px rgba(0,0,0,0.18)',
        }}/>
        {/* Rope 2 */}
        <div style={{position:'absolute',top:268,left:-8,right:-8,height:3,
          background:'linear-gradient(90deg,#c8a870,#a88050,#c8a870)',
          borderRadius:2,boxShadow:'0 1px 5px rgba(0,0,0,0.18)',
        }}/>

        {items.map((item,i)=>{
          const ropeY = i < 3 ? 78 : 268;
          return (
            <div key={i} style={{position:'absolute',left:item.left,top:ropeY-8,display:'flex',flexDirection:'column',alignItems:'center'}}>
              {/* Pin */}
              <div style={{width:13,height:22,background:'linear-gradient(180deg,#d4a040,#a87020)',borderRadius:'4px 4px 6px 6px',boxShadow:'0 1px 4px rgba(0,0,0,0.25)'}}/>
              {/* String */}
              <div style={{width:1,height:item.top - 5,background:'rgba(0,0,0,0.2)'}}/>
              {/* Card */}
              <div style={{
                width:item.w, height:item.h, borderRadius:4,
                transform:`rotate(${item.rotate}deg)`,
                boxShadow:'0 4px 14px rgba(0,0,0,0.14),0 1px 4px rgba(0,0,0,0.08)',
                overflow:'hidden', background: item.type==='note'?item.color:'white',
                display:'flex', flexDirection:'column',
              }}>
                {item.type==='photo' ? (
                  <>
                    <div style={{flex:1,background:`linear-gradient(135deg,${item.gradFrom},${item.gradTo})`,
                      display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" strokeWidth="1.5" strokeLinecap="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5" fill="rgba(255,255,255,0.7)" stroke="none"/>

                    </div>
                    <div style={{background:'white',padding:'6px 8px',fontSize:10,color:T.s,textAlign:'center'}}>{item.caption}</div>

                  <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:12}}>
                    <div style={{fontSize:13,color:T.p,lineHeight:1.6,textAlign:'center',whiteSpace:'pre-line'}}>{item.text}</div>
                  </div>
                )}
              </div>
            </div>
          );
        })}

        <div style={{position:'absolute',bottom:14,left:0,right:0,textAlign:'center',fontSize:12,color:'rgba(139,100,60,0.5)'}}>

        </div>

        <div style={{height:44,borderRadius:22,background:T.brand,display:'flex',alignItems:'center',justifyContent:'center',gap:6,boxShadow:'0 4px 16px rgba(255,77,136,0.35)'}}>

          <span style={{fontSize:15,color:'white',fontWeight:500}}>挂上新回忆</span>
        </div>
      </div>

/* ============================================================

============================================================ */

    {x:285, y:388, r:4, label:'元旦跨年', date:'1.1', c:'#90ffcc'},
    {x:90,  y:400, r:3, label:'', c:'#90b0ff'},
    {x:205, y:438, r:5, label:'', c:T.brand},
    {x:340, y:462, r:4, label:'春节', date:'2.3', c:'#ffaa70'},
    {x:130, y:498, r:3, label:'', c:'#90b0ff'},

  ];
  const lines = [[0,2],[2,5],[5,7],[7,8],[0,3],[3,5],[7,13]];

  return (
    <Phone bg="#0d0f1e" statusBg="#0d0f1e">
      <div style={{height:44,background:'#0d0f1e',flexShrink:0,display:'flex',alignItems:'center',padding:'0 16px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div style={{width:44,fontSize:22,color:'rgba(255,255,255,0.4)'}}>‹</div>
        <div style={{flex:1,textAlign:'center'}}>
          <div style={{fontSize:17,fontWeight:500,color:'rgba(255,255,255,0.92)'}}>我们的星图</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.35)',marginTop:1}}>38颗星 · 相识第102天</div>
        </div>
        <div style={{width:44,textAlign:'right',color:'rgba(255,255,255,0.35)',fontSize:20}}>⋯</div>
      </div>

      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {/* Nebula */}
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 60% 40% at 45% 30%,rgba(80,40,160,0.28) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 70% 65%,rgba(255,77,136,0.1) 0%,transparent 60%)'}}/>
        {/* Tiny bg stars */}
        {Array.from({length:55}).map((_,i)=>(
          <div key={i} style={{position:'absolute',
            left:`${(i*41+17)%93+2}%`, top:`${(i*59+11)%90+2}%`,

          }}/>
        ))}
        {/* Constellation lines */}
        <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',overflow:'visible'}}>
          {lines.map(([a,b],i)=>(
            <line key={i} x1={stars[a].x} y1={stars[a].y} x2={stars[b].x} y2={stars[b].y}
              stroke="rgba(255,255,255,0.1)" strokeWidth="1" strokeDasharray="4 5"/>
          ))}
        </svg>
        {/* Stars */}
        {stars.map((s,i)=>(
          <div key={i} style={{position:'absolute',left:s.x-s.r,top:s.y-s.r,width:s.r*2,height:s.r*2,borderRadius:'50%',
            background:s.c, boxShadow:`0 0 ${s.r*3}px ${s.r}px ${s.c}55,0 0 ${s.r*7}px ${s.c}20`}}>
            {s.label && (
              <div style={{position:'absolute',left:s.r*2+5,top:'50%',transform:'translateY(-50%)',whiteSpace:'nowrap'}}>
                <div style={{fontSize:11,color:'rgba(255,255,255,0.85)',textShadow:'0 1px 4px rgba(0,0,0,0.8)'}}>{s.label}</div>
                {s.date && <div style={{fontSize:10,color:'rgba(255,255,255,0.38)',marginTop:1}}>{s.date}</div>}
              </div>
            )}
          </div>
        ))}
        <div style={{position:'absolute',bottom:16,left:0,right:0,textAlign:'center',fontSize:12,color:'rgba(255,255,255,0.3)'}}>

        </div>
      </div>

      <div style={{padding:'10px 16px 14px',background:'#13162a',borderTop:'1px solid rgba(255,255,255,0.07)',flexShrink:0}}>
        <div style={{height:44,borderRadius:22,background:'rgba(255,77,136,0.85)',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <span style={{fontSize:15,color:'white',fontWeight:500}}>✦ 记录新星星</span>
        </div>
      </div>
      <HomeInd dark={true}/>
    </Phone>

============================================================ */

        <div style={{fontSize:11,color:T.t,marginTop:5}}>再完成 2 个任务即可升级 🎉</div>

              </div>
              {task.done ? (
                <div style={{width:28,height:28,borderRadius:14,background:'#f0f0f0',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke={T.grn} strokeWidth="2.2" strokeLinecap="round"><path d="M2.5 7l3 3 6-6"/></svg>

                <div style={{height:28,borderRadius:14,background:T.brand,padding:'0 12px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:12,color:'white',fontWeight:500}}>完成</span>
                </div>

          ))}
        </div>
        {/* Weekly */}
        <div style={{background:T.sur,padding:'14px 16px'}}>

              </div>
              <div style={{height:6,borderRadius:3,background:'#f5f5f7',overflow:'hidden'}}>
                <div style={{width:`${(task.prog/task.total)*100}%`,height:'100%',borderRadius:3,background:`linear-gradient(90deg,${T.brand},#ff90bf)`}}/>
              </div>
              <div style={{fontSize:11,color:T.t,marginTop:4}}>{task.prog} / {task.total} 次完成</div>
            </div>
          ))}
        </div>
      </div>
      <HomeInd/>
    </Phone>

};

/* ============================================================
   E: 关系档案 Relationship Stats
============================================================ */
const RelationStats = () => {
  const dims = [
    {label:'浪漫', val:85},
    {label:'沟通', val:72},
    {label:'陪伴', val:90},
    {label:'趣味', val:68},
    {label:'贴心', val:88},
  ];
  const n = dims.length, cx=130, cy=130, r=88;
  const pt = (i, v) => {
    const a = (i*2*Math.PI/n) - Math.PI/2;
    const rr = (v/100)*r;
    return [cx + rr*Math.cos(a), cy + rr*Math.sin(a)];
  };
  const ax = (i) => {
    const a = (i*2*Math.PI/n) - Math.PI/2;
    return [cx + r*Math.cos(a), cy + r*Math.sin(a)];
  };
  const lx = (i) => {
    const a = (i*2*Math.PI/n) - Math.PI/2;
    return [cx + (r+22)*Math.cos(a), cy + (r+22)*Math.sin(a)];
  };

  return (
    <Phone>
      <div style={{height:44,background:T.sur,flexShrink:0,display:'flex',alignItems:'center',padding:'0 16px',borderBottom:`1px solid ${T.line}`}}>
        <div style={{width:44,fontSize:22,color:T.brand}}>‹</div>
        <div style={{flex:1,textAlign:'center',fontSize:17,fontWeight:500,color:T.p}}>关系档案</div>
        <div style={{width:44,textAlign:'right',fontSize:20,color:T.s}}>⋯</div>
      </div>
      {/* Couple header */}
      <div style={{background:T.sur,padding:'14px 16px',borderBottom:`1px solid ${T.line}`,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{display:'flex'}}>
            <div style={{width:44,height:44,borderRadius:22,background:'#ffb3cc',border:'2.5px solid white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🧑‍🦱</div>
            <div style={{width:44,height:44,borderRadius:22,background:'#a8c8f0',border:'2.5px solid white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,marginLeft:-16}}>👦</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:500,color:T.p}}>晶晶 & 小明</div>
            <div style={{fontSize:12,color:T.t,marginTop:2}}>相识于 2025年11月22日</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:24,fontWeight:700,color:T.brand,lineHeight:1}}>102</div>
            <div style={{fontSize:11,color:T.t}}>天在一起</div>
          </div>
        </div>
      </div>

      <div style={{flex:1,overflow:'hidden',background:T.bg}}>
        {/* Radar */}
        <div style={{background:T.sur,padding:'14px 16px',marginBottom:8}}>
          <div style={{fontSize:14,fontWeight:500,color:T.p,marginBottom:8}}>亲密雷达</div>
          <div style={{display:'flex',justifyContent:'center'}}>
            <svg width="260" height="260" viewBox="0 0 260 260">
              {[0.25,0.5,0.75,1].map((s,i)=>(
                <polygon key={i}
                  points={dims.map((_,j)=>{const [x,y]=ax(j); const a=(j*2*Math.PI/n)-Math.PI/2; return [cx+(r*s)*Math.cos(a),cy+(r*s)*Math.sin(a)].join(',')}).join(' ')}
                  fill="none" stroke={T.line} strokeWidth="1"/>
              ))}
              {dims.map((_,i)=>{const[x,y]=ax(i); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={T.line} strokeWidth="1"/>;  })}
              <polygon points={dims.map(({val},i)=>pt(i,val).join(',')).join(' ')} fill="rgba(255,77,136,0.12)" stroke={T.brand} strokeWidth="2"/>
              {dims.map(({val},i)=>{const[x,y]=pt(i,val); return <circle key={i} cx={x} cy={y} r="4" fill={T.brand}/>;  })}
              {dims.map(({label},i)=>{const[x,y]=lx(i); return <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize="12" fill={T.s}>{label}</text>;  })}
            </svg>
          </div>
        </div>

        {/* Stats grid */}
        <div style={{background:T.sur,padding:'14px 16px'}}>
          <div style={{fontSize:14,fontWeight:500,color:T.p,marginBottom:10}}>关系数据</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[
              {label:'共同记录',val:'127条',icon:'📝'},
              {label:'互相回应',val:'284次',icon:'❤️'},
              {label:'一起打卡',val:'18次',icon:'📍'},
              {label:'连续记录',val:'23天',icon:'🔥'},
            ].map((s,i)=>(
              <div key={i} style={{background:T.bg,borderRadius:10,padding:'10px 12px',display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontSize:18}}>{s.icon}</span>
                <div>
                  <div style={{fontSize:16,fontWeight:600,color:T.p}}>{s.val}</div>
                  <div style={{fontSize:11,color:T.t}}>{s.label}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <HomeInd/>
    </Phone>
  );
};
