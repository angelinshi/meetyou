const STICKY_BG  = ['#FFF4ED','#EDF5F0','#FDF0F5','#FDF8ED'];

// Pure-text: card + sticky; has-media: all three
const availTpl = (hasMedia) => hasMedia ? ['card','sticky','polaroid'] : ['card','sticky'];

// ── Date helpers ─────────────────────────────────────────────────
const START_DATE = new Date('2024-02-18');
function daysSince(ds) {
  const d = new Date(ds); d.setHours(0,0,0,0);
  const s = new Date(START_DATE); s.setHours(0,0,0,0);
  return Math.floor((d-s)/86400000)+1;
}
function formatDayLabel(ds) {
  const now=new Date();now.setHours(0,0,0,0);
  const d=new Date(ds);d.setHours(0,0,0,0);
  const diff=Math.round((now-d)/86400000);
  const label=diff===0?'今天':diff===1?'昨天':`${d.getMonth()+1}月${d.getDate()}日`;
  return { label, daysStr:`第${daysSince(ds)}天` };
}
function formatTime(ds,ts) {
  const now=new Date();now.setHours(0,0,0,0);
  const d=new Date(ds);d.setHours(0,0,0,0);
  const diff=Math.round((now-d)/86400000);
  if(diff===0) return ts;
  if(diff===1) return `昨天 ${ts}`;
  const dd=new Date(ds);
  return `${dd.getMonth()+1}月${dd.getDate()}日 ${ts}`;
}

// ── Ava ──────────────────────────────────────────────────────────

// ── VoiceBubble ──────────────────────────────────────────────────
function VoiceBubble({ sec, playing, onPlay }) {
  const [transcript,setTranscript]=useState('');
  const [loading,setLoading]=useState(false);
  const [showText,setShowText]=useState(false);
  const bars=20;
  const heights=Array.from({length:bars},(_,i)=>{
    const x=i/bars;
    return 3+Math.round(Math.sin(x*Math.PI*3+1)*5+Math.sin(x*Math.PI*7)*3+3);
  });
  const handleTranscribe=async(e)=>{
    e.stopPropagation();
    if(transcript){setShowText(s=>!s);return;}
    setLoading(true);setShowText(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,
          messages:[{role:'user',content:`请模拟一段恋人之间真实自然的语音转文字结果，内容温柔甜蜜，语气口语化，长度约${Math.max(8,sec*3)}字以内，只返回转写文字本身。`}]})});
      const data=await res.json();
      setTranscript(data.content?.[0]?.text?.trim()||'（转写失败）');
    }catch{setTranscript('（转写失败，请重试）');}
    setLoading(false);
  };
  return (
    <div style={{marginTop:6}}>
      <div style={{display:'inline-flex',alignItems:'center',gap:8,
        background:playing?T.roseSoft:T.bg,border:`1.5px solid ${playing?T.rose:'transparent'}`,
        borderRadius:20,padding:'8px 12px 8px 14px',cursor:'pointer',transition:'all 0.2s'}}>
        <div onClick={onPlay} style={{width:28,height:28,borderRadius:'50%',background:T.rose,
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          {playing
            ?<svg width="10" height="12" viewBox="0 0 10 12"><rect x="0" y="0" width="3.5" height="12" rx="1.5" fill="#fff"/><rect x="6.5" y="0" width="3.5" height="12" rx="1.5" fill="#fff"/></svg>
            :<svg width="10" height="12" viewBox="0 0 10 12"><path d="M1 1l8 5-8 5V1z" fill="#fff"/></svg>}
        </div>
        <div onClick={onPlay} style={{display:'flex',alignItems:'center',gap:2.5,height:20}}>
          {heights.map((h,i)=>(
            <div key={i} style={{width:2.5,height:h,background:playing?T.rose:'#C0B8C8',borderRadius:2,
              animation:playing?`waveBar ${0.5+i*0.04}s ease-in-out infinite alternate`:'none',
              animationDelay:playing?`${i*0.04}s`:'0s',transition:'background 0.2s'}}/>
          ))}
        </div>
        <span onClick={onPlay} style={{fontSize:12.5,color:playing?T.rose:T.textSec,fontWeight:500,flexShrink:0}}>{sec}"</span>
        <div onClick={handleTranscribe} style={{width:22,height:22,borderRadius:'50%',flexShrink:0,
          background:showText?T.roseSoft:'transparent',display:'flex',alignItems:'center',justifyContent:'center',
          cursor:'pointer',marginLeft:2,border:showText?`1px solid ${T.rose}`:'1px solid transparent',transition:'all 0.15s'}}>
          {loading
            ?<div style={{width:10,height:10,border:`1.5px solid ${T.rose}`,borderTopColor:'transparent',
              borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>
            :<span style={{fontSize:10,fontWeight:700,letterSpacing:'-0.5px',
              color:showText?T.rose:T.textTer,lineHeight:1,fontFamily:T.font}}>文字</span>}
        </div>
      </div>
      {showText&&transcript&&(
        <div style={{marginTop:6,padding:'8px 12px',background:'rgba(255,77,136,0.05)',
          border:`1px solid ${T.roseSoft}`,borderRadius:10,fontSize:13.5,color:T.textSec,
          lineHeight:'20px',animation:'fadeIn 0.2s ease'}}>{transcript}</div>
      )}
      {showText&&loading&&(
        <div style={{marginTop:6,padding:'8px 12px',background:T.bg,borderRadius:10,
          fontSize:12.5,color:T.textTer,display:'flex',alignItems:'center',gap:6,animation:'fadeIn 0.2s ease'}}>
          <div style={{width:12,height:12,border:`1.5px solid ${T.rose}`,borderTopColor:'transparent',
            borderRadius:'50%',animation:'spin 0.7s linear infinite',flexShrink:0}}/>
          正在转写…
        </div>
      )}
    </div>
  );
}

// ── PhotoGrid ────────────────────────────────────────────────────
function PhotoGrid({ count, photoUrls=[] }) {
  if (!count) return null;
  const cols=count===1?1:count===2?2:3;
  const size=count===1?160:count===2?110:80;
  return (
    <div style={{display:'grid',gridTemplateColumns:`repeat(${cols},${size}px)`,gap:3,margin:'8px 0'}}>
      {Array.from({length:count}).map((_,i)=>(
        <div key={i} style={{width:size,height:size,borderRadius:6,overflow:'hidden',
          background:`hsl(${340+i*20},60%,${88-i*4}%)`}}>
          {photoUrls[i]&&<img src={photoUrls[i]} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>}
        </div>
      ))}
    </div>
  );
}

function VideoPlaceholder() {

      alignItems:'center',justifyContent:'center',marginTop:8}}>

        display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="13" height="15" viewBox="0 0 12 14"><path d="M1 1l10 6-10 6V1z" fill="rgba(255,255,255,0.8)"/></svg>
      </div>

}

// ── TemplateTag — layout picker popup ───────────────────────────
// 固定"布局"图标，点击弹出选项面板
const LayoutIcon = () => (
  <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
    <path d="M10 2l1 3 3 1-3 1-1 3-1-3-3-1 3-1z"/>
    <line x1="2" y1="16" x2="9" y2="9"/>
    <line x1="2" y1="9" x2="4" y2="7"/>
  </svg>
);
function TemplateTag({ post, onChangeTemplate }) {
  const [open, setOpen] = useState(false);
  if (post.kind==='voice') return null;
  const avail = availTpl(post.hasMedia);
  const cur = post.template||'card';
  return (
    <div style={{position:'relative',flexShrink:0}} onClick={e=>e.stopPropagation()}>
      <div onClick={()=>setOpen(s=>!s)}
        style={{width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',
          cursor:'pointer',color:open?T.rose:T.textTer,
          opacity:open?0.9:0.38,transition:'opacity 0.15s,color 0.15s'}}
        onMouseEnter={e=>{e.currentTarget.style.opacity='0.85';e.currentTarget.style.color=T.rose;}}
        onMouseLeave={e=>{if(!open){e.currentTarget.style.opacity='0.38';e.currentTarget.style.color=T.textTer;}}}>
        <LayoutIcon/>
      </div>
      {open && (
        <div style={{position:'absolute',top:28,right:0,
          background:T.white,borderRadius:12,overflow:'hidden',
          boxShadow:'0 4px 18px rgba(0,0,0,0.14)',zIndex:50,
          display:'flex',flexDirection:'column',minWidth:96}}>
          {avail.map(t=>(
            <div key={t} onClick={()=>{onChangeTemplate(post.id,t);setOpen(false);}}
              style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',
                cursor:'pointer',fontSize:13,fontFamily:T.font,
                color:t===cur?T.rose:T.textPri,
                background:t===cur?T.roseSoft:'transparent',
                transition:'background 0.12s'}}>
              <div style={{width:8,height:8,borderRadius:'50%',flexShrink:0,
                background:t===cur?T.rose:'transparent',
                border:`1.5px solid ${t===cur?T.rose:'rgba(0,0,0,0.2)'}`}}/>
              {TPL_LABELS[t]}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── ReactionArea ─────────────────────────────────────────────────
// Only opponent's posts show the emoji picker.
// Own posts show opponent's reaction read-only.
function ReactionArea({ post, onReact }) {
  const isMe = post.author===ME;
  const myReaction = post.reactions[ME.name];
  const theirReaction = post.reactions[LOVER.name];

  if (isMe) {
    if (!theirReaction) return null;
    return (
      <span style={{fontSize:12,color:T.textSec,fontStyle:'italic'}}>来自TA的{theirReaction}</span>
    );
  }
  // Opponent's post — I can react
  if (myReaction) return (
    <div style={{display:'flex',gap:4,alignItems:'center'}}>
      <span style={{fontSize:12,color:T.rose,fontWeight:500}}>来自你的{myReaction}</span>
      <span onClick={()=>onReact(post.id,null)}
        style={{fontSize:11,color:T.textTer,cursor:'pointer',lineHeight:1,
          opacity:0.55,transition:'opacity 0.15s'}}
        onMouseEnter={e=>e.currentTarget.style.opacity='1'}
        onMouseLeave={e=>e.currentTarget.style.opacity='0.55'}>✎</span>
    </div>
  );
  return (
    <div style={{display:'flex',gap:2}}>
      {REACT_EMOJIS.map(e=>(
        <span key={e} onClick={()=>onReact(post.id,e)}
          style={{fontSize:17,opacity:0.32,cursor:'pointer',padding:'0 2px',
            display:'inline-block',transition:'opacity 0.12s,transform 0.1s'}}
          onMouseEnter={ev=>{ev.currentTarget.style.opacity='0.92';ev.currentTarget.style.transform='scale(1.22)';}}
          onMouseLeave={ev=>{ev.currentTarget.style.opacity='0.32';ev.currentTarget.style.transform='scale(1)';}}>{e}</span>
      ))}
    </div>
  );
}

// ── CommentsList — template-aware ────────────────────────────────
function CommentsList({ comments, template='card' }) {
  if (!comments.length) return null;
  const renderText = c => c.kind==='photo'
    ? <span style={{display:'inline-flex',alignItems:'center',gap:3,background:'rgba(74,122,175,0.07)',borderRadius:6,padding:'1px 7px',fontSize:11.5,color:T.textSec}}>📷</span>
    : <span>{c.text}</span>;

  if (template==='sticky') {
    return (
      <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid rgba(0,0,0,0.07)'}}>
        {comments.map((c,i)=>(
          <div key={i} style={{fontSize:12.5,lineHeight:'20px',marginBottom:i<comments.length-1?3:0}}>
            <span style={{fontWeight:600,color:c.author===ME?T.rose:'#4A7AAF',marginRight:4}}>{c.author.name}</span>
            <span style={{color:'rgba(0,0,0,0.52)'}}>{renderText(c)}</span>
          </div>
        ))}
      </div>
    );
  }
  if (template==='polaroid') {
    return (
      <div style={{marginTop:6,paddingTop:6,borderTop:'1px dashed rgba(0,0,0,0.1)'}}>
        {comments.map((c,i)=>(
          <div key={i} style={{fontFamily:'"KaiTi","STKaiti","楷体",serif',fontSize:12.5,
            lineHeight:'20px',color:T.textSec,marginBottom:i<comments.length-1?3:0}}>
            <span style={{fontWeight:600,color:c.author===ME?T.rose:'#4A7AAF',marginRight:4}}>{c.author.name}</span>
            {renderText(c)}
          </div>
        ))}
      </div>
    );
  }
  // 卡片：气泡线程
  return (
    <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:6}}>
      {comments.map((c,i)=>(
        <div key={i} style={{animation:'fadeIn 0.18s ease'}}>
          <div style={{background:T.bg,borderRadius:10,padding:'6px 10px',display:'inline-flex',maxWidth:'92%'}}>
            <span style={{fontSize:12,fontWeight:600,color:c.author===ME?T.rose:'#4A7AAF',marginRight:5,flexShrink:0}}>{c.author.name}</span>
            <span style={{fontSize:13,color:T.textSec,lineHeight:'18px'}}>{renderText(c)}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── ReplyBox ──────────────────────────────────────────────────────
function ReplyBox({ postId, replyText, kbOpen, onOpenKb, onSubmit, onClose }) {
  return (
    <div style={{marginTop:8,animation:'fadeIn 0.18s ease'}}>
      <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
        <Ava person={ME} size={26}/>
        <div onClick={onOpenKb} style={{flex:1,background:kbOpen?T.white:T.bg,borderRadius:16,
          border:`1.5px solid ${kbOpen?T.rose:'transparent'}`,padding:'6px 12px',
          display:'flex',alignItems:'center',cursor:'text',minHeight:34,transition:'border 0.15s,background 0.15s'}}>
          <span style={{flex:1,fontSize:13.5,color:replyText?T.textPri:T.textTer,
            fontFamily:T.font,wordBreak:'break-all',whiteSpace:'pre-wrap',minHeight:18}}>
            {replyText||'写下你的回复…'}
          </span>
          {kbOpen&&<span style={{display:'inline-block',width:2,height:16,background:T.rose,
            borderRadius:1,marginLeft:1,animation:'blink 1s step-end infinite'}}/>}
        </div>
        <button onClick={()=>{if(replyText.trim())onSubmit(postId,replyText.trim());}}
          style={{height:34,padding:'0 12px',borderRadius:17,
            background:replyText.trim()?T.rose:'#E0DDE6',
            color:replyText.trim()?'#fff':T.textTer,
            border:'none',fontSize:13,fontWeight:600,cursor:'pointer',
            transition:'background 0.2s',fontFamily:T.font,flexShrink:0}}>回复</button>
      </div>
      <div onClick={onClose} style={{textAlign:'right',fontSize:12,color:T.textTer,
        marginTop:4,cursor:'pointer',paddingRight:4}}>取消</div>
    </div>
  );
}

// ── Post ──────────────────────────────────────────────────────────
function Post({ post, onReply, onDelete, onReact, onChangeTemplate,
  replyingId, replyText, replyKbOpen, onOpenReply, onCloseReply, onOpenReplyKb,
  playingId, onPlay, isLast }) {
  const isMe = post.author===ME;
  const isReplying = replyingId===post.id;
  const isPlaying = playingId===post.id;
  const tpl = post.template||'card';

  // dayLabel removed — integrated into card headers

  const contentArea = post.kind==='voice'
    ? <VoiceBubble sec={post.voiceSec} playing={isPlaying} onPlay={()=>onPlay(post.id)}/>
    : (
      <>
        {post.text&&<div style={{fontSize:14,color:T.textPri,lineHeight:'22px',wordBreak:'break-all'}}>{post.text}</div>}
        <PhotoGrid count={post.photos} photoUrls={post.photoUrls||[]}/>
        {post.hasVideo&&<VideoPlaceholder/>}
      </>
    );

  // ── Reaction display — emoji only, no text ──
  const reactionDisplay = (() => {
    const isMe = post.author===ME;
    const myReaction = post.reactions[ME.name];
    const theirReaction = post.reactions[LOVER.name];
    if (isMe) {
      if (!theirReaction) return null;
      return (
        <div style={{paddingBottom:6}}>
          <span style={{fontSize:18,opacity:0.7}}>{theirReaction}</span>
        </div>
      );
    }
    if (myReaction) return (
      <div style={{paddingBottom:6,display:'flex',alignItems:'center',gap:5}}>
        <span style={{fontSize:20}}>{myReaction}</span>
        <span onClick={()=>onReact(post.id,null)}
          style={{fontSize:11,color:T.textTer,cursor:'pointer',opacity:0.45,lineHeight:1,transition:'opacity 0.15s'}}
          onMouseEnter={e=>e.currentTarget.style.opacity='1'}
          onMouseLeave={e=>e.currentTarget.style.opacity='0.45'}>✎</span>
      </div>
    );
    return (
      <div style={{paddingBottom:6,display:'flex',gap:1}}>
        {REACT_EMOJIS.map(e=>(
          <span key={e} onClick={()=>onReact(post.id,e)}
            style={{fontSize:17,opacity:0.28,cursor:'pointer',padding:'0 3px',
              display:'inline-block',transition:'opacity 0.12s,transform 0.1s'}}
            onMouseEnter={ev=>{ev.currentTarget.style.opacity='0.88';ev.currentTarget.style.transform='scale(1.22)';}}
            onMouseLeave={ev=>{ev.currentTarget.style.opacity='0.28';ev.currentTarget.style.transform='scale(1)';}}
          >{e}</span>
        ))}
      </div>
    );
  })();

  // ── 操作按钒组（删除 + 回复）──
  const reactionActions = (
    <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
      {isMe&&(
        <button onClick={e=>{e.stopPropagation();onDelete(post.id);}}
          style={{background:'none',border:'none',cursor:'pointer',padding:2,opacity:0.28,lineHeight:1,transition:'opacity 0.15s'}}
          onMouseEnter={e=>e.currentTarget.style.opacity='0.65'}
          onMouseLeave={e=>e.currentTarget.style.opacity='0.28'}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <polyline points="3 6 5 6 21 6" stroke={T.textSec} strokeWidth="1.6" strokeLinecap="round"/>
            <path d="M19 6l-1 14H6L5 6" stroke={T.textSec} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M10 11v6M14 11v6" stroke={T.textSec} strokeWidth="1.6" strokeLinecap="round"/>
            <path d="M9 6V4h6v2" stroke={T.textSec} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
      )}
      <button onClick={e=>{e.stopPropagation();onOpenReply(post.id);}}
        style={{display:'flex',alignItems:'center',gap:3,background:'none',border:'none',
          cursor:'pointer',padding:'2px 0',fontFamily:T.font,fontSize:12,
          color:isReplying?T.rose:T.textSec}}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
            stroke={isReplying?T.rose:T.textSec} strokeWidth="1.8" strokeLinejoin="round"/>
        </svg>
        回复
      </button>
    </div>
  );
  const actionRow = (
    <div style={{display:'flex',alignItems:'center',gap:6,marginTop:10}}>
      {reactionDisplay}
      <div style={{flex:1}}/>
      {reactionActions}
    </div>
  );

  // ── Render card by template ──────────────────────────────────
  let cardEl;
  if (tpl==='sticky') {
    cardEl = (
      <div style={{position:'relative',marginTop:8,paddingTop:2}}>
        {/* 胶带 */}
        <div style={{position:'absolute',top:-8,left:'50%',transform:'translateX(-50%)',
          width:42,height:14,borderRadius:2,zIndex:2,
          background:'rgba(255,255,255,0.52)',
          boxShadow:'0 1px 3px rgba(0,0,0,0.10)',
          border:'1px solid rgba(255,255,255,0.72)'}}/>
        <div style={{
          background:STICKY_BG[post.id%4],
          borderRadius:2,
          padding:'16px 14px 12px',
          position:'relative',zIndex:1,
          boxShadow:'0 1px 1px rgba(0,0,0,0.10),0 3px 8px rgba(0,0,0,0.10),0 10px 28px rgba(0,0,0,0.08),2px 14px 30px rgba(0,0,0,0.05)',
          border:'1px solid rgba(0,0,0,0.04)',
        }}>
        <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:8}}>
          <Ava person={post.author} size={28}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:isMe?T.rose:'#4A7AAF'}}>{post.author.name}</div>
            <div style={{fontSize:10.5,color:'rgba(0,0,0,0.32)',marginTop:1}}>第{daysSince(post.date)}天 · {formatTime(post.date,post.time)}</div>
          </div>
          <TemplateTag post={post} onChangeTemplate={onChangeTemplate}/>
        </div>
        {contentArea}
        {actionRow}
        <CommentsList comments={post.comments} template='sticky'/>
        </div>
      </div>
    );
  } else if (tpl==='polaroid') {
    const gradBg = isMe
      ? 'linear-gradient(135deg,#FFD3E2,#EECDE0)'
      : 'linear-gradient(135deg,#C8D8F0,#B8CDE8)';
    cardEl = (
      <div style={{background:'#FAFAF8',borderRadius:4,padding:'10px 10px 16px',
        boxShadow:'0 1px 1px rgba(0,0,0,0.10),0 3px 8px rgba(0,0,0,0.10),0 10px 28px rgba(0,0,0,0.08),2px 14px 30px rgba(0,0,0,0.05)',
        border:'1px solid rgba(0,0,0,0.04)'}}>
        <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:8}}>
          <Ava person={post.author} size={28}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:isMe?T.rose:'#4A7AAF'}}>{post.author.name}</div>
            <div style={{fontSize:10.5,color:T.textTer,marginTop:1}}>第{daysSince(post.date)}天 · {formatTime(post.date,post.time)}</div>
          </div>
          <TemplateTag post={post} onChangeTemplate={onChangeTemplate}/>
        </div>
        {/* 4:3 image area */}
        <div style={{width:'100%',aspectRatio:'4/3',borderRadius:2,overflow:'hidden',marginBottom:10,
          background:post.hasMedia?'linear-gradient(135deg,#E8E0D8,#D8D0C8)':gradBg,
          display:'flex',alignItems:'center',justifyContent:'center'}}>
          {(post.photoUrls||[])[0]
            ?<img src={post.photoUrls[0]} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
            :<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.45)" strokeWidth="1.5" strokeLinecap="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5" fill="rgba(255,255,255,0.45)" stroke="none"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>}
        </div>
        {post.text&&(
          <p style={{fontFamily:'"KaiTi","STKaiti","楷体",serif',fontSize:13,
            color:T.textSec,padding:'0 4px',lineHeight:1.7,margin:'0 0 6px'}}>{post.text}</p>
        )}
        {actionRow}
        <CommentsList comments={post.comments} template='polaroid'/>
      </div>
    );
  } else {
    // Default: card
    cardEl = (
      <div style={{background:T.white,borderRadius:14,
        boxShadow:'0 1px 1px rgba(0,0,0,0.10),0 3px 8px rgba(0,0,0,0.10),0 10px 28px rgba(0,0,0,0.08),2px 14px 30px rgba(0,0,0,0.05)',
        border:'1px solid rgba(0,0,0,0.04)',padding:'11px 13px'}}>
        <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:8}}>
          <Ava person={post.author} size={28}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:isMe?T.rose:'#4A7AAF'}}>{post.author.name}</div>
            <div style={{fontSize:10.5,color:T.textTer,marginTop:1}}>第{daysSince(post.date)}天 · {formatTime(post.date,post.time)}</div>
          </div>
          <TemplateTag post={post} onChangeTemplate={onChangeTemplate}/>
        </div>
        {contentArea}
        {actionRow}
        <CommentsList comments={post.comments} template='card'/>
      </div>
    );
  }

  return (
    <div style={{animation:'fadeIn 0.22s ease',padding:'0 16px',paddingBottom:isLast?8:14}}>
      <div style={{minWidth:0}}>
        {cardEl}
        {isReplying&&(
          <ReplyBox postId={post.id} replyText={replyText} kbOpen={replyKbOpen}
            onOpenKb={onOpenReplyKb}
            onSubmit={(id,val)=>onReply(id,val)}
            onClose={onCloseReply}/>
        )}
      </div>
    </div>
  );
}

// ── MockKeyboard ──────────────────────────────────────────────────
const ROWS=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['⇧','z','x','c','v','b','n','m','⌫']];
const KB_EMOJIS=['😂','❤️','🥰','😭','🌹','🍵','☕','🥾','✨','💕','🤣','😍','🎉','💪','🙏'];
const SUGGESTIONS=['❤️','🥰','😘','今天','在一起','好开心','爱你','想你','记录','一起'];

function MockKeyboard({ text, placeholder, attachments=[], onChar, onDelete, onEnter,
  onClose, onVoice, onPhoto, onVideo, onRemoveAttachment, sendLabel='发送' }) {
  const [shifted,setShifted]=useState(false);
  const [panel,setPanel]=useState('keys');
  const bg='#D1D5DB',keyBg='#FFFFFF',specBg='#ADB5BD';
  const press=k=>{
    if(k==='⌫'){onDelete();return;}
    if(k==='⇧'){setShifted(s=>!s);return;}
    onChar(shifted?k.toUpperCase():k);
    if(shifted)setShifted(false);
  };
  const canSend = text.trim()||attachments.length>0;
  const Ico=({children,onClick,active})=>(
    <div onClick={onClick} style={{width:38,height:38,borderRadius:'50%',
      background:active?'rgba(255,77,136,0.12)':'transparent',
      display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
      {children}
    </div>
  );
  return (
    <div style={{position:'absolute',bottom:0,left:0,right:0,background:'#F7F7F7',zIndex:20,
      animation:'slideUp 0.22s cubic-bezier(0.32,0.72,0,1)',boxShadow:'0 -1px 0 rgba(0,0,0,0.08)'}}>
      {/* Input row */}
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px 6px',
        background:T.white,borderBottom:`1px solid ${T.line}`}}>
        <div style={{flex:1,background:'#F2F2F5',borderRadius:20,padding:'7px 14px',
          display:'flex',alignItems:'center',border:`1.5px solid ${T.rose}`,minHeight:36}}>
          <span style={{flex:1,fontSize:14,lineHeight:'20px',color:text?T.textPri:T.textTer,
            fontFamily:T.font,wordBreak:'break-all',whiteSpace:'pre-wrap',minHeight:20}}>
            {text||placeholder||'记录这一刻…'}
          </span>
          <span style={{display:'inline-block',width:2,height:18,background:T.rose,borderRadius:1,
            marginLeft:1,animation:'blink 1s step-end infinite'}}/>
        </div>
        <button onMouseDown={e=>{e.preventDefault();onEnter();}} style={{
          height:34,padding:'0 16px',borderRadius:17,
          background:canSend?T.rose:'#E0DDE6',
          color:canSend?'#fff':T.textTer,
          border:'none',fontSize:13.5,fontWeight:600,cursor:'pointer',
          transition:'background 0.18s',fontFamily:T.font,flexShrink:0,whiteSpace:'nowrap'}}>
          {sendLabel}
        </button>
      </div>
      {/* Attachment preview */}
      {attachments.length>0&&(
        <div style={{display:'flex',gap:8,padding:'8px 12px 4px',background:T.white,
          borderBottom:`1px solid ${T.line}`,overflowX:'auto'}}>
          {attachments.map((att,i)=>(
            <div key={att.id||i} style={{position:'relative',flexShrink:0}}>
              <div style={{width:60,height:60,borderRadius:8,overflow:'hidden',
                background:att.type==='video'?'#1a1a2e':'#E8E0D8',
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                {att.type==='photo'&&att.url
                  ?<img src={att.url} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                  :att.type==='photo'
                  ?<span style={{fontSize:22}}>🖼</span>
                  :<svg width="16" height="18" viewBox="0 0 12 14"><path d="M1 1l10 6-10 6V1z" fill="rgba(255,255,255,0.7)"/></svg>}
              </div>
              <div onMouseDown={e=>{e.preventDefault();onRemoveAttachment(att.id||i);}} style={{
                position:'absolute',top:-4,right:-4,width:18,height:18,borderRadius:9,
                background:'rgba(0,0,0,0.55)',display:'flex',alignItems:'center',
                justifyContent:'center',cursor:'pointer'}}>
                <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 1l6 6M7 1L1 7" stroke="white" strokeWidth="1.4" strokeLinecap="round"/></svg>
              </div>
            </div>
          ))}
        </div>
      )}
      {/* Toolbar */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-around',
        padding:'4px 8px',background:T.white,borderBottom:`1px solid ${T.line}`}}>

        <Ico onClick={onPhoto}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="5" width="20" height="15" rx="2.5" stroke={T.textSec} strokeWidth="1.6"/>
            <circle cx="12" cy="12.5" r="3.5" stroke={T.textSec} strokeWidth="1.6"/>
            <path d="M7 5l1.5-2h7L17 5" stroke={T.textSec} strokeWidth="1.6" strokeLinejoin="round"/>
          </svg>
        </Ico>
        <Ico onClick={onVideo}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="5" width="15" height="14" rx="2" stroke={T.textSec} strokeWidth="1.6"/>
            <path d="M17 9l5-3v12l-5-3V9z" stroke={T.textSec} strokeWidth="1.6" strokeLinejoin="round"/>
          </svg>
        </Ico>
        <Ico onClick={()=>setPanel(p=>p==='emoji'?'keys':'emoji')} active={panel==='emoji'}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke={panel==='emoji'?T.rose:T.textSec} strokeWidth="1.6"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2" stroke={panel==='emoji'?T.rose:T.textSec} strokeWidth="1.6" strokeLinecap="round"/>
            <circle cx="9" cy="10" r="1.2" fill={panel==='emoji'?T.rose:T.textSec}/>
            <circle cx="15" cy="10" r="1.2" fill={panel==='emoji'?T.rose:T.textSec}/>
          </svg>
        </Ico>
        <Ico onClick={onClose}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M6 15l6-6 6 6" stroke={T.textSec} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </Ico>
      </div>
      {/* Suggestion strip */}
      <div style={{display:'flex',alignItems:'center',gap:0,overflowX:'auto',
        padding:'5px 10px',background:'#EFEFEF',borderBottom:`1px solid ${T.line}`}}>
        {SUGGESTIONS.map((s,i)=>(
          <button key={i} onMouseDown={e=>{e.preventDefault();s.split('').forEach(c=>onChar(c));}}
            style={{flexShrink:0,background:'none',border:'none',padding:'3px 10px',fontSize:13.5,
              color:T.textPri,cursor:'pointer',fontFamily:T.font,
              borderRight:i<SUGGESTIONS.length-1?`1px solid #DDD`:'none'}}>{s}</button>
        ))}
      </div>
      {/* Keys / Emoji */}
      {panel==='emoji' ? (
        <div style={{padding:'10px 8px 6px',background:bg}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:4,justifyContent:'center'}}>
            {KB_EMOJIS.map(e=>(
              <button key={e} onMouseDown={e2=>{e2.preventDefault();onChar(e);}}
                style={{width:42,height:42,background:keyBg,border:'none',borderRadius:8,
                  fontSize:22,cursor:'pointer',boxShadow:'0 1px 0 #8A8E96'}}>{e}</button>
            ))}
          </div>
        </div>
      ) : (
        <div style={{background:bg,paddingBottom:4}}>
          {ROWS.map((row,ri)=>(
            <div key={ri} style={{display:'flex',justifyContent:'center',gap:5,margin:'4px 0',padding:'0 4px'}}>
              {row.map(k=>{
                const sp=k==='⇧'||k==='⌫';
                return (
                  <button key={k}
                    onMouseDown={e=>{e.preventDefault();press(k);}}
                    onTouchStart={e=>{e.preventDefault();press(k);}}
                    style={{flex:sp?1.5:1,maxWidth:sp?44:34,height:42,
                      background:sp?specBg:keyBg,color:'#000',border:'none',borderRadius:5,
                      fontSize:15,cursor:'pointer',boxShadow:'0 1px 0 #8A8E96',fontFamily:T.font,
                      display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {k==='⇧'
                      ?<svg width="14" height="14" viewBox="0 0 24 24"><path d="M12 4L4 14h5v6h6v-6h5L12 4z" fill={shifted?T.rose:'#333'}/></svg>
                      :k==='⌫'
                      ?<svg width="18" height="14" viewBox="0 0 24 18"><path d="M9 1H22V17H9L1 9L9 1Z" stroke="#333" strokeWidth="1.5" fill="none"/><path d="M12 6L18 12M18 6L12 12" stroke="#333" strokeWidth="1.5" strokeLinecap="round"/></svg>
                      :shifted?k.toUpperCase():k}
                  </button>
                );
              })}
            </div>
          ))}
          <div style={{display:'flex',gap:5,padding:'4px 6px 4px',justifyContent:'center'}}>
            <button onMouseDown={e=>{e.preventDefault();onChar(' ');}} style={{flex:1,height:42,background:'#B0B8C4',border:'none',borderRadius:5,fontSize:13,cursor:'pointer',boxShadow:'0 1px 0 #8A8E96',fontFamily:T.font,color:'#333'}}>123</button>
            <button onMouseDown={e=>{e.preventDefault();onChar(' ');}} style={{flex:3,height:42,background:keyBg,border:'none',borderRadius:5,fontSize:13,cursor:'pointer',boxShadow:'0 1px 0 #8A8E96',fontFamily:T.font}}>空格</button>
            <button onMouseDown={e=>{e.preventDefault();onChar('\n');}} style={{flex:1,height:42,background:'#B0B8C4',border:'none',borderRadius:5,fontSize:13,cursor:'pointer',boxShadow:'0 1px 0 #8A8E96',fontFamily:T.font,color:'#333'}}>换行</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── VoiceRecorder ─────────────────────────────────────────────────
function VoiceRecorder({ onFinish, onTranscribe, onCancel }) {
  const [sec,setSec]=useState(0);
  const [phase,setPhase]=useState('recording');
  const [transcript,setTranscript]=useState('');
  const intervalRef=useRef(null);
  useEffect(()=>{
    intervalRef.current=setInterval(()=>setSec(s=>s+1),1000);
    return()=>clearInterval(intervalRef.current);
  },[]);
  const stopRecording=()=>{clearInterval(intervalRef.current);setPhase('preview');};
  const reRecord=()=>{setSec(0);setTranscript('');setPhase('recording');intervalRef.current=setInterval(()=>setSec(s=>s+1),1000);};
  const handleTranscribe=async()=>{
    setPhase('transcribing');
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,
          messages:[{role:'user',content:`请模拟一段恋人之间真实自然的语音转文字结果，内容温柔甜蜜，长度约${Math.max(10,sec*3)}字以内，只返回转写文字本身。`}]})});
      const data=await res.json();
      setTranscript(data.content?.[0]?.text?.trim()||'');
    }catch{setTranscript('（转写失败，请重试）');}
  };
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const BARS=28;
  return (
    <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.55)',
      display:'flex',alignItems:'flex-end',zIndex:30,animation:'fadeIn 0.18s ease'}}>
      <div style={{width:'100%',background:T.white,borderRadius:'20px 20px 0 0',padding:'24px 20px 32px'}}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:600,color:T.textPri}}>
            {phase==='recording'?'正在录音…':phase==='transcribing'?'正在转文字…':transcript?'转写结果':'预览语音'}
          </div>
          {phase!=='transcribing'&&!transcript&&(
            <div style={{fontSize:26,fontWeight:700,color:T.rose,marginTop:6,fontVariantNumeric:'tabular-nums',letterSpacing:2}}>{fmt(sec)}</div>
          )}
        </div>
        {phase==='transcribing' ? (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:60,gap:8,marginBottom:24}}>
            <div style={{width:28,height:28,border:`3px solid ${T.roseSoft}`,borderTop:`3px solid ${T.rose}`,borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
            <span style={{fontSize:13,color:T.textTer}}>AI 语音转文字中…</span>
          </div>
        ) : transcript ? (
          <div style={{background:T.bg,borderRadius:12,padding:'12px 14px',marginBottom:20,minHeight:56}}>
            <p style={{fontSize:15,color:T.textPri,lineHeight:'24px',margin:0}}>{transcript}</p>
          </div>
        ) : (
          <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:3,height:40,marginBottom:24}}>
            {Array.from({length:BARS}).map((_,i)=>{
              const h=4+Math.round(Math.sin(i/BARS*Math.PI*4)*8+Math.sin(i/BARS*Math.PI*9)*5+6);
              return (<div key={i} style={{width:3,height:h,borderRadius:2,
                background:phase==='recording'?T.rose:'#C0B8C8',
                animation:phase==='recording'?`waveBar ${0.45+i*0.035}s ease-in-out infinite alternate`:'none',
                animationDelay:`${i*0.035}s`}}/>);
            })}
          </div>
        )}
        {phase==='recording' ? (
          <div style={{display:'flex',justifyContent:'center',gap:24}}>
            <button onClick={onCancel} style={{width:56,height:56,borderRadius:'50%',background:'#F2F2F5',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:4}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke={T.textSec} strokeWidth="2.2" strokeLinecap="round"/></svg>
              <span style={{fontSize:10,color:T.textSec}}>取消</span>
            </button>
            <button onClick={stopRecording} style={{width:72,height:72,borderRadius:'50%',background:T.rose,border:'none',cursor:'pointer',position:'relative',boxShadow:`0 0 0 8px ${T.roseSoft}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{width:22,height:22,borderRadius:4,background:'#fff'}}/>
              <div style={{position:'absolute',inset:-4,borderRadius:'50%',border:`2px solid ${T.rose}`,opacity:0.4,animation:'ripple 1.4s ease-out infinite'}}/>
            </button>
          </div>
        ) : transcript ? (
          <div style={{display:'flex',gap:10}}>
            <button onClick={reRecord} style={{flex:1,height:46,borderRadius:23,background:'#F2F2F5',border:'none',cursor:'pointer',fontSize:14,color:T.textSec,fontFamily:T.font}}>重录</button>
            <button onClick={()=>onTranscribe(transcript)} style={{flex:2,height:46,borderRadius:23,background:T.rose,border:'none',cursor:'pointer',fontSize:14,fontWeight:600,color:'#fff',fontFamily:T.font}}>使用文字</button>
          </div>
        ) : (
          <div style={{display:'flex',gap:10}}>
            <button onClick={reRecord} style={{height:46,width:46,borderRadius:23,background:'#F2F2F5',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 4v6h6" stroke={T.textSec} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M3.51 15a9 9 0 1 0 .49-4.95L1 10" stroke={T.textSec} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
            <button onClick={handleTranscribe} style={{flex:1,height:46,borderRadius:23,background:'#F2F2F5',border:'none',cursor:'pointer',fontSize:13.5,color:T.textSec,fontFamily:T.font}}>转文字</button>
            <button onClick={()=>onFinish(sec)} style={{flex:1,height:46,borderRadius:23,background:T.rose,border:'none',cursor:'pointer',fontSize:13.5,fontWeight:600,color:'#fff',fontFamily:T.font}}>发送语音</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── DiaryScreen ───────────────────────────────────────────────────
function DiaryScreen() {
  const [posts,setPosts]=useState(INITIAL_POSTS.map(p=>({...p})));
  const [text,setText]=useState('');
  const [attachments,setAttachments]=useState([]);
  const [kbOpen,setKbOpen]=useState(false);
  const [replyingId,setReply]=useState(null);
  const [replyText,setReplyText]=useState('');
  const [replyKbOpen,setReplyKb]=useState(false);
  const [replyVoice,setReplyVoice]=useState(false);
  const [playingId,setPlaying]=useState(null);
  const [showVoice,setVoice]=useState(false);
  const [emojiRain,setEmojiRain]=useState(null);
  const [toast,setToast]=useState('');
  const [coverImg,setCoverImg]=useState(null);
  const [showMore,setShowMore]=useState(false);
  const [navScrolled,setNavScrolled]=useState(false);
  const coverRef=useRef(null);
  const photoRef=useRef(null);
  const feedRef=useRef(null);
  const hiddenRef=useRef(null);
  const attId=useRef(0);
  const KB_H=260;

  useEffect(()=>{
    const el=feedRef.current;
    if(!el)return;
    const fn=()=>setNavScrolled(el.scrollTop>160);
    el.addEventListener('scroll',fn);
    return()=>el.removeEventListener('scroll',fn);
  },[]);

  useEffect(()=>{
    if(playingId===null)return;
    const p=posts.find(p=>p.id===playingId);
    if(!p)return;
    const t=setTimeout(()=>setPlaying(null),(p.voiceSec||5)*1000);
    return()=>clearTimeout(t);
  },[playingId]);

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(''),2000);};

  const handleDelete=id=>setPosts(ps=>ps.filter(p=>p.id!==id));

  const handleReply=(id,val)=>{
    setPosts(ps=>ps.map(p=>p.id===id?{...p,comments:[...p.comments,{author:ME,text:val}]}:p));
    setReply(null);setReplyText('');setReplyKb(false);
  };

  const handleReact=(postId,emoji)=>{
    setPosts(ps=>ps.map(p=>{
      if(p.id!==postId)return p;
      const reactions={...p.reactions};
      if(emoji===null) delete reactions[ME.name];
      else reactions[ME.name]=emoji;
      return{...p,reactions};
    }));
    if(emoji){
      const extras=['✨','💫','⭐','🌟','💕','💗','💖','✦'];
      const particles=Array.from({length:28},(_,i)=>({
        id:i,
        content: i<16 ? emoji : extras[i%extras.length],
        x:3+Math.random()*94,
        delay:Math.random()*1.1,
        dur:1.6+Math.random()*1.6,
        size: i<16 ? 18+Math.random()*18 : 11+Math.random()*10,
        drift:(Math.random()-0.5)*90,
        spin:(Math.random()-0.5)*140,
        opacity: i<16 ? 1 : 0.55+Math.random()*0.35,
      }));
      setEmojiRain({emoji,particles});
      setTimeout(()=>setEmojiRain(null),3800);
    }
  };

  const handleChangeTemplate=(postId,template)=>{
    setPosts(ps=>ps.map(p=>p.id===postId?{...p,template}:p));
  };

  const addAttachment=(type,url)=>{
    const id=++attId.current;
    setAttachments(a=>[...a,{id,type,url}]);
  };

  const removeAttachment=id=>{
    setAttachments(a=>a.filter(att=>att.id!==id));
  };

  const handleSend=useCallback(()=>{
    if(!text.trim()&&attachments.length===0)return;
    const now=new Date();
    const ds=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const ts=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const photos=attachments.filter(a=>a.type==='photo');
    const hasVideo=attachments.some(a=>a.type==='video');
    const hasMedia=attachments.length>0;
    const np={id:Date.now(),author:ME,date:ds,time:ts,kind:'text',template:'card',
      text:text.trim(),photos:photos.length,photoUrls:photos.map(a=>a.url),
      hasVideo,hasMedia,reactions:{},comments:[]};
    setPosts(ps=>[np,...ps]);
    setText('');setAttachments([]);setKbOpen(false);
    if(feedRef.current)feedRef.current.scrollTop=0;
  },[text,attachments]);

  const handleVoiceFinish=sec=>{
    setVoice(false);
    const now=new Date();
    const ds=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const ts=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    setPosts(ps=>[{id:Date.now(),author:ME,date:ds,time:ts,kind:'voice',template:'card',voiceSec:sec,
      photos:0,photoUrls:[],hasVideo:false,hasMedia:false,reactions:{},comments:[]},...ps]);
    if(feedRef.current)feedRef.current.scrollTop=0;
  };

  const handleReplyVoiceFinish=sec=>{
    setReplyVoice(false);
    if(replyingId===null)return;
    setPosts(ps=>ps.map(p=>p.id===replyingId
      ?{...p,comments:[...p.comments,{author:ME,kind:'voice',voiceSec:sec}]}:p));
    setReply(null);setReplyText('');setReplyKb(false);
  };

  const handleReplyPhoto=()=>{
    if(replyingId===null)return;
    setPosts(ps=>ps.map(p=>p.id===replyingId
      ?{...p,comments:[...p.comments,{author:ME,kind:'photo',photos:1}]}:p));
    setReply(null);setReplyText('');setReplyKb(false);
  };

  const openKb=()=>{setKbOpen(true);setReplyKb(false);setReply(null);};
  const closeKb=()=>setKbOpen(false);

  return (
    <div style={{width:375,height:780,borderRadius:44,overflow:'hidden',position:'relative',
      boxShadow:'0 32px 80px rgba(0,0,0,0.28),0 0 0 1px rgba(0,0,0,0.07)',
      background:T.white,display:'flex',flexDirection:'column'}}>

      <textarea ref={hiddenRef} value={text} onChange={e=>setText(e.target.value)}
        style={{position:'absolute',left:-9999,top:-9999,opacity:0,width:1,height:1,border:'none',outline:'none'}}/>

      {/* Status bar */}
      <div style={{height:44,background:T.white,display:'flex',alignItems:'flex-end',
        justifyContent:'space-between',padding:'0 20px 8px',flexShrink:0}}>
        <span style={{fontSize:12,fontWeight:600,color:T.textPri}}>9:41</span>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <svg width="16" height="12" viewBox="0 0 16 12">
            <rect x="0" y="4" width="3" height="8" rx="1" fill={T.textPri}/>
            <rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill={T.textPri}/>
            <rect x="9" y=".5" width="3" height="11.5" rx="1" fill={T.textPri}/>
            <rect x="13.5" y="0" width="2" height="12" rx="1" fill={T.textPri} opacity=".3"/>
          </svg>
          <svg width="15" height="12" viewBox="0 0 15 12">
            <path d="M7.5 3C9.8 3 11.8 4 13.2 5.5L14.5 4.2C12.7 2.3 10.2 1 7.5 1S2.3 2.3.5 4.2L1.8 5.5C3.2 4 5.2 3 7.5 3Z" fill={T.textPri}/>
            <path d="M7.5 6C8.9 6 10.1 6.6 11 7.5L12.3 6.2C11.1 5 9.4 4.2 7.5 4.2S3.9 5 2.7 6.2L4 7.5C4.9 6.6 6.1 6 7.5 6Z" fill={T.textPri}/>
            <circle cx="7.5" cy="10" r="1.5" fill={T.textPri}/>
          </svg>
          <div style={{width:25,height:12,border:`1.5px solid ${T.textPri}`,borderRadius:3,position:'relative'}}>
            <div style={{position:'absolute',left:1,top:1,bottom:1,right:4,background:T.textPri,borderRadius:1.5}}/>
            <div style={{position:'absolute',right:-4,top:3,width:2.5,height:6,background:T.textPri,borderRadius:1}}/>
          </div>
        </div>
      </div>

      {/* File inputs */}
      <input ref={coverRef} type="file" accept="image/*" style={{display:'none'}}
        onChange={e=>{const f=e.target.files[0];if(f){setCoverImg(URL.createObjectURL(f));}e.target.value='';}}/>
      <input ref={photoRef} type="file" accept="image/*" style={{display:'none'}}
        onChange={e=>{const f=e.target.files[0];if(f){addAttachment('photo',URL.createObjectURL(f));}e.target.value='';}}/>

      {/* Nav overlay */}
      <div style={{position:'absolute',top:44,left:0,right:0,height:44,zIndex:20,
        display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',
        pointerEvents:'none',transition:'background 0.25s',
        background:navScrolled?T.white:'transparent',
        borderBottom:navScrolled?`1px solid ${T.line}`:'none'}}>
        <div style={{pointerEvents:'auto',width:36,height:36,borderRadius:'50%',
          background:navScrolled?T.bg:'rgba(0,0,0,0.18)',display:'flex',alignItems:'center',
          justifyContent:'center',cursor:'pointer',transition:'background 0.25s'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M15 5l-7 7 7 7" stroke={navScrolled?T.textPri:'#fff'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
        <div style={{pointerEvents:'auto',position:'relative'}}>
          <div onClick={()=>setShowMore(s=>!s)}
            style={{width:36,height:36,borderRadius:'50%',background:navScrolled?T.bg:'rgba(0,0,0,0.18)',
              display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'background 0.25s'}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="5" r="1.5" fill={navScrolled?T.textSec:'#fff'}/>
              <circle cx="12" cy="12" r="1.5" fill={navScrolled?T.textSec:'#fff'}/>
              <circle cx="12" cy="19" r="1.5" fill={navScrolled?T.textSec:'#fff'}/>
            </svg>
          </div>
          {showMore&&(
            <div style={{position:'absolute',top:42,right:0,background:T.white,borderRadius:12,
              overflow:'hidden',boxShadow:'0 4px 20px rgba(0,0,0,0.15)',minWidth:120,zIndex:30}}>
              <div onClick={()=>{coverRef.current?.click();setShowMore(false);}}
                style={{display:'flex',alignItems:'center',gap:8,padding:'11px 16px',
                  fontSize:13.5,color:T.textPri,cursor:'pointer',borderBottom:`1px solid ${T.line}`}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <rect x="2" y="5" width="20" height="15" rx="2.5" stroke={T.textPri} strokeWidth="1.6"/>
                  <circle cx="12" cy="12.5" r="3.2" stroke={T.textPri} strokeWidth="1.6"/>
                  <path d="M7 5l1.5-2h7L17 5" stroke={T.textPri} strokeWidth="1.6" strokeLinejoin="round"/>
                </svg>
                换封面
              </div>
              <div onClick={()=>setShowMore(false)} style={{padding:'11px 16px',fontSize:13.5,color:T.textTer,cursor:'pointer'}}>取消</div>
            </div>
          )}
        </div>
      </div>

      {/* Dismiss overlay */}
      {(kbOpen||replyKbOpen)&&(
        <div onClick={()=>{setKbOpen(false);setReplyKb(false);setReply(null);setReplyText('');}}
          style={{position:'absolute',top:0,left:0,right:0,bottom:KB_H+76+20,zIndex:14}}/>
      )}

      {/* Feed */}
      <div ref={feedRef} style={{flex:1,overflowY:'auto',background:T.white,
        transition:'margin-bottom 0.25s cubic-bezier(0.32,0.72,0,1)',
        marginBottom:(kbOpen||replyKbOpen)?KB_H:0}}
        onClick={()=>showMore&&setShowMore(false)}>

        {/* Cover */}
        <div style={{position:'relative',width:'100%',height:220,flexShrink:0,
          background:coverImg?'transparent':'linear-gradient(135deg,#FFD3E2 0%,#FFAAC8 45%,#E8A0C0 100%)'}}>
          {coverImg&&<img src={coverImg} alt="cover" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>}
          <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,0.06) 0%,rgba(0,0,0,0.38) 100%)'}}/>
          <div style={{position:'absolute',bottom:16,left:16,right:16,display:'flex',alignItems:'flex-end',gap:12}}>
            <div style={{position:'relative',width:68,height:44}}>
              <div style={{position:'absolute',left:0,top:2,width:40,height:40,borderRadius:'50%',
                overflow:'hidden',border:'2.5px solid rgba(255,255,255,0.9)',boxShadow:'0 2px 8px rgba(0,0,0,0.2)'}}>
                <Ava person={ME} size={40}/>
              </div>
              <div style={{position:'absolute',right:0,bottom:2,width:40,height:40,borderRadius:'50%',
                overflow:'hidden',border:'2.5px solid rgba(255,255,255,0.9)',boxShadow:'0 2px 8px rgba(0,0,0,0.2)'}}>
                <Ava person={LOVER} size={40}/>
              </div>
            </div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:'#fff',textShadow:'0 1px 4px rgba(0,0,0,0.4)'}}>女友殿下 ❤︎ 男友先生</div>
              <div style={{fontSize:11.5,color:'rgba(255,255,255,0.85)',marginTop:3,textShadow:'0 1px 3px rgba(0,0,0,0.3)'}}>
                在一起 {posts.length>0?daysSince(posts[0].date):daysSince(new Date().toISOString().slice(0,10))} 天
              </div>
            </div>
          </div>
        </div>

        <div style={{height:24}}/>

        {posts.map((post,i)=>{
          return (
            <Post key={post.id} post={post}
              onReply={handleReply}
              onDelete={handleDelete}
              onReact={handleReact}
              onChangeTemplate={handleChangeTemplate}
              replyingId={replyingId}
              replyText={replyText}
              replyKbOpen={replyKbOpen&&replyingId===post.id}
              onOpenReply={id=>{setReply(id);setReplyText('');setReplyKb(true);setKbOpen(false);}}
              onCloseReply={()=>{setReply(null);setReplyText('');setReplyKb(false);}}
              onOpenReplyKb={()=>{setReplyKb(true);setKbOpen(false);}}
              playingId={playingId}
              onPlay={id=>setPlaying(p=>p===id?null:id)}
              isLast={i===posts.length-1}
            />
          );
        })}
        <div style={{height:20}}/>
      </div>

      {/* Input bar */}
      <div style={{flexShrink:0,background:T.white,borderTop:`1px solid ${T.line}`,padding:'8px 12px',
        transition:'transform 0.25s cubic-bezier(0.32,0.72,0,1)',
        transform:kbOpen?`translateY(-${KB_H}px)`:replyKbOpen?`translateY(100px)`:'translateY(0)',
        zIndex:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <Ava person={ME} size={32}/>
          <div onClick={openKb} style={{flex:1,background:T.bg,borderRadius:20,
            padding:'9px 16px',cursor:'text',fontSize:14,color:T.textTer,fontFamily:T.font}}>
            {attachments.length>0
              ?<span style={{color:T.textSec}}>已添加 {attachments.length} 个附件，继续编辑…</span>
              :'记录这一刻…'}
          </div>
        </div>
      </div>

      {/* Home indicator */}
      <div style={{height:20,background:T.white,flexShrink:0,display:'flex',
        alignItems:'center',justifyContent:'center',
        transition:'transform 0.25s cubic-bezier(0.32,0.72,0,1)',
        transform:kbOpen?`translateY(-${KB_H}px)`:replyKbOpen?`translateY(100px)`:'translateY(0)',
        zIndex:10}}>
        <div style={{width:120,height:4,background:T.textPri,borderRadius:2,opacity:0.15}}/>
      </div>

      {/* Main keyboard */}
      {kbOpen&&!replyKbOpen&&(
        <MockKeyboard
          text={text}
          placeholder="记录这一刻…"
          attachments={attachments}
          onChar={c=>setText(t=>t+c)}
          onDelete={()=>setText(t=>t.slice(0,-1))}
          onEnter={handleSend}
          onClose={closeKb}
          onVoice={()=>{}}
          onPhoto={()=>photoRef.current?.click()}
          onVideo={()=>addAttachment('video',null)}
          onRemoveAttachment={removeAttachment}
          sendLabel="发布"
        />
      )}

      {/* Reply keyboard */}
      {replyKbOpen&&(
        <MockKeyboard
          text={replyText}
          placeholder="说点什么…"
          attachments={[]}
          onChar={c=>setReplyText(t=>t+c)}
          onDelete={()=>setReplyText(t=>t.slice(0,-1))}
          onEnter={()=>{if(replyText.trim())handleReply(replyingId,replyText.trim());}}
          onClose={()=>{setReplyKb(false);setReply(null);setReplyText('');}}
          onVoice={()=>{}}
          onPhoto={handleReplyPhoto}
          onVideo={handleReplyPhoto}
          onRemoveAttachment={()=>{}}
          sendLabel="回复"
        />
      )}



      {/* 表情雨 */}
      {emojiRain&&(
        <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:100,overflow:'hidden'}}>
          {emojiRain.particles.map(p=>(
            <div key={p.id} style={{
              position:'absolute',top:0,left:`${p.x}%`,
              fontSize:p.size,lineHeight:1,
              animation:`emojiRainFall ${p.dur}s ${p.delay}s ease-in forwards`,
              '--emoji-drift':`${p.drift}px`,
              '--emoji-spin':`${p.spin}deg`,
              opacity:p.opacity||1,
            }}>{p.content}</div>
          ))}
        </div>
      )}

      {toast&&(
        <div style={{position:'absolute',bottom:80,left:'50%',transform:'translateX(-50%)',
          background:'rgba(0,0,0,0.65)',color:'#fff',fontSize:13,padding:'7px 18px',
          borderRadius:20,zIndex:50,whiteSpace:'nowrap',animation:'fadeIn 0.2s ease'}}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DiaryScreen/>);
</script>
</body>
</html>
