<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>女生视角主页 · 未邀请 vs 已邀请</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html,body{margin:0;padding:0;height:100%;background:#EDECEA;
    font-family:-apple-system,"PingFang SC","Helvetica Neue",system-ui,sans-serif;overflow:hidden;}
  *{box-sizing:border-box;}
  #root{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
  ::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="screens-shared.jsx"></script>
<script type="text/babel" src="screens-invite.jsx"></script>
<script type="text/babel" src="screens-diary-v2.jsx"></script>

<script type="text/babel">
/* ── 普通顶栏（无天气）── */
function PlainTopBar() {
  return (
    <div style={{
      position:'absolute',top:36,left:0,right:0,height:44,zIndex:10,
      background:'#f2f2f5',
      borderBottom:'1px solid rgba(0,0,0,0.06)',
      display:'flex',alignItems:'center',justifyContent:'center',
    }}>
      {/* 左：搜索 */}
      <div style={{position:'absolute',left:16,top:0,height:44,display:'flex',alignItems:'center'}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke={MY.textSec} strokeWidth="1.8"/>
          <path d="M16.5 16.5l4 4" stroke={MY.textSec} strokeWidth="1.8" strokeLinecap="round"/>
        </svg>
      </div>
      {/* 中：美柚 */}
      <span style={{fontSize:17,fontWeight:500,color:MY.textPri}}>美柚</span>
      {/* 右：发帖铅笔 */}
      <div style={{position:'absolute',right:16,top:0,height:44,display:'flex',alignItems:'center'}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 20h9" stroke={MY.textSec} strokeWidth="1.8" strokeLinecap="round"/>
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"
            stroke={MY.textSec} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
    </div>
  );
}

/* ── 邀请 Banner ── */
function InviteBanner({ onInvite }) {
  return (
    <div onClick={onInvite} style={{
      margin:'8px 16px 0',borderRadius:MY.rmd,padding:'16px',
      background:'linear-gradient(140deg,#fff5f8 0%,#ffe8f0 60%,#ffd6e6 100%)',
      position:'relative',overflow:'hidden',cursor:'pointer',
      boxShadow:MY.shadow1,
    }}>
      {/* 关闭 */}
      <div style={{position:'absolute',top:10,right:10,width:24,height:24,
        display:'flex',alignItems:'center',justifyContent:'center',color:MY.textTer}}
        onClick={e=>e.stopPropagation()}>
        <svg width="14" height="14" viewBox="0 0 24 24">
          <path d="M6 6l12 12M6 18L18 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
        </svg>
      </div>
      {/* 小心形 */}
      <svg width="14" height="14" viewBox="0 0 24 24" style={{position:'absolute',top:12,right:76}}>
        <path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 11c0 5.5-7 10-7 10z" fill="rgba(255,77,136,0.3)"/>
      </svg>
      <svg width="9" height="9" viewBox="0 0 24 24" style={{position:'absolute',top:30,right:100}}>
        <path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 11c0 5.5-7 10-7 10z" fill="rgba(255,77,136,0.45)"/>
      </svg>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        {/* 双头像 */}
        <div style={{flexShrink:0,position:'relative',width:72,height:56}}>
          <div style={{position:'absolute',left:0,top:2,border:'2.5px solid #fff',borderRadius:'50%',overflow:'hidden',boxShadow:MY.shadow1}}>
            <Avatar size={44} bg={USER.bg} initial={USER.initial}/>
          </div>
          <div style={{position:'absolute',right:0,bottom:0,border:'2.5px solid #fff',borderRadius:'50%'}}>
            <MalePlaceholder size={40}/>
          </div>
          <div style={{position:'absolute',left:26,top:16,width:18,height:18,borderRadius:'50%',
            background:MY.brandRed,border:'2px solid #fff',zIndex:2,
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="10" height="10" viewBox="0 0 24 24">
              <path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 11c0 5.5-7 10-7 10z" fill="#fff"/>
            </svg>
          </div>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:15,fontWeight:600,color:MY.textPri,lineHeight:'22px'}}>邀请男友关注你的经期</div>
          <div style={{fontSize:12,color:MY.textSec,marginTop:4,lineHeight:'18px'}}>经期预测 · 每日症状 · 恋爱记录</div>
        </div>
      </div>
      <button style={{
        display:'block',width:'100%',marginTop:14,
        height:44,borderRadius:MY.rpill,border:'none',
        background:MY.brandRed,color:'#fff',
        fontSize:15,fontWeight:600,cursor:'pointer',fontFamily:MY.font,
        boxShadow:'0 4px 12px rgba(255,77,136,0.35)',
      }}>去邀请</button>
    </div>
  );
}

/* ── 主页（未邀请）── */
function HomeUnpaired() {
  return (
    <Phone bg='#f2f2f5'>
      <PlainTopBar/>
      <div style={{position:'absolute',inset:'80px 0 50px',overflowY:'auto'}}>
        <div style={{height:8}}/>
        <PeriodHeroCard/>
        <PeriodTodayRow/>
        <InviteBanner/>
        <CommunityFeed/>
      </div>
      <PostFAB/>
      <TabBar active="home" firstLabel="推荐"/>
    </Phone>
  );
}

/* ── 主页（已邀请）── */
function HomePaired() {
  return (
    <Phone bg='#f2f2f5'>
      <PlainTopBar/>
      <div style={{position:'absolute',inset:'80px 0 50px',overflowY:'auto'}}>
        <div style={{height:8}}/>
        <PeriodHeroCard/>
        <PeriodTodayRow/>
        {/* 恋爱记模块 */}
        <div style={{margin:'8px 16px 0'}}>
          <DiaryHomeModule onViewAll={()=>{}} isEmpty={false}/>
        </div>
        <CommunityFeed/>
      </div>
      <PostFAB/>
      <TabBar active="home" firstLabel="推荐"/>
    </Phone>
  );
}

/* ── 布局 ── */
function App() {
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const compute = () => {
      const s = Math.min(
        (window.innerWidth  - 48) / (375*2 + 48),
        (window.innerHeight - 80) / 820,
        1
      );
      setScale(s);
    };
    compute();
    window.addEventListener('resize', compute);
    return () => window.removeEventListener('resize', compute);
  }, []);

  return (
    <div style={{
      display:'flex',flexDirection:'column',alignItems:'center',gap:20,
      transform:`scale(${scale})`,transformOrigin:'center center',
    }}>
      {/* 标签行 */}
      <div style={{display:'flex',gap:48,width:375*2+48}}>
        <div style={{width:375,textAlign:'center',fontSize:13,fontWeight:600,
          color:'rgba(0,0,0,0.38)',letterSpacing:'.06em'}}>未邀请</div>
        <div style={{width:375,textAlign:'center',fontSize:13,fontWeight:600,
          color:'rgba(0,0,0,0.38)',letterSpacing:'.06em'}}>已邀请（含恋爱记模块）</div>
      </div>
      {/* 两部手机 */}
      <div style={{display:'flex',gap:48,alignItems:'flex-start'}}>
        <div style={{
          width:375,height:780,borderRadius:44,overflow:'hidden',position:'relative',
          boxShadow:'0 32px 80px rgba(0,0,0,0.30),0 0 0 1px rgba(0,0,0,0.08)',
        }}>
          <HomeUnpaired/>
        </div>
        <div style={{
          width:375,height:780,borderRadius:44,overflow:'hidden',position:'relative',
          boxShadow:'0 32px 80px rgba(0,0,0,0.30),0 0 0 1px rgba(0,0,0,0.08)',
        }}>
          <HomePaired/>
        </div>
      </div>
    </div>
  );
}

// 等所有组件加载完毕
function waitAndRender(tries=0) {
  if (typeof Phone !== 'undefined'
    && typeof PeriodHeroCard !== 'undefined'
    && typeof DiaryHomeModule !== 'undefined'
    && typeof MalePlaceholder !== 'undefined') {
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  } else if (tries < 50) {
    setTimeout(() => waitAndRender(tries+1), 100);
  }
}
waitAndRender();
</script>
</body>
</html>
