<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <title>Petal · 经期模式 — 男友邀请流程</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, "PingFang SC", "Helvetica Neue", system-ui, sans-serif; }
    * { box-sizing: border-box; }
    @keyframes diarySlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes diaryBlink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes diaryWave{0%,100%{height:4px}50%{height:14px}}
    @keyframes diaryFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="image-slot.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="screens-shared.jsx"></script>
  <script type="text/babel" src="screens-invite.jsx"></script>
  <script type="text/babel" src="screens-me.jsx"></script>
  <script type="text/babel" src="screens-bf.jsx"></script>
  <script type="text/babel" src="screens-diary-v2.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="flow-a"
            title="A · 女生视角：发起邀请流程"
            subtitle="首页 → 记录tab（含邀请入口）→ 发送邀请 → 我的二维码"
          >
            <DCArtboard id="s1" label="① 首页 · 未绑定" width={360} height={780}>
              <Screen1Home/>
            </DCArtboard>
            <DCArtboard id="sR" label="② 记录 tab（含邀请 banner）" width={360} height={780}>
              <Screen_RecordInvite/>
            </DCArtboard>
            <DCArtboard id="s2" label="③ 发送邀请" width={360} height={780}>
              <Screen2Invite/>
            </DCArtboard>
            <DCArtboard id="s3" label="④ 我的二维码" width={360} height={780}>
              <Screen3QR/>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="flow-b"
            title="B · 女生视角：邀请成功"
            subtitle="绑定后首页 → 恋爱日记 → 我的页面 → 个人信息 → 伴侣管理"
          >
            <DCArtboard id="s4" label="① 首页 · 已绑定（恋爱日记）" width={360} height={780}>
              <Screen4HomePaired/>
            </DCArtboard>
            <DCArtboard id="s5" label="② 恋爱日记 · 全部记录" width={360} height={780}>
              <Screen5DiaryAll/>
            </DCArtboard>
            <DCArtboard id="s6" label="③ 我的页面" width={360} height={780}>
              <Screen6Me/>
            </DCArtboard>
            <DCArtboard id="s7" label="④ 个人信息" width={360} height={780}>
              <Screen7Profile/>
            </DCArtboard>
            <DCArtboard id="s8" label="⑤ 我的伴侣（管理）" width={360} height={780}>
              <Screen8Partner/>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="flow-c"
            title="C · 男生视角：接受邀请流程-微信"
            subtitle="微信消息 → 邀请链接 → 接受成功 → 选择模式 → 登录"
          >
            <DCArtboard id="wc1" label="① 微信聊天（收到邀请）" width={360} height={780}>
              <Screen_WeChatMsg/>
            </DCArtboard>
            <DCArtboard id="wc2" label="② 邀请链接（输入手机号）" width={360} height={780}>
              <Screen_InviteH5/>
            </DCArtboard>
            <DCArtboard id="wc3" label="③ 已成功接受邀请" width={360} height={780}>
              <Screen_AcceptSuccess/>
            </DCArtboard>
            <DCArtboard id="wc4" label="④ 请选择模式" width={360} height={780}>
              <Screen_ModeSelect/>
            </DCArtboard>
            <DCArtboard id="wc5" label="⑤ 欢迎登录美柚" width={360} height={780}>
              <Screen_LoginPhone/>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="flow-d"
            title="D · 男生视角：成功加入"
            subtitle="男友主页 → 今日密报 → 恋爱日记 → 记录tab（只读日历）"
          >
            <DCArtboard id="bf1" label="① 男友主页" width={360} height={780}>
              <BFHome onSecretDetail={()=>{}} onDiary={()=>{}}/>
            </DCArtboard>
            <DCArtboard id="bf2" label="② 今日密报（男友视角）" width={360} height={780}>
              <BFSecretDetail onBack={()=>{}}/>
            </DCArtboard>
            <DCArtboard id="bf3" label="③ 恋爱日记（男友视角）" width={360} height={780}>
              <BFDiary onBack={()=>{}}/>
            </DCArtboard>
            <DCArtboard id="bf4" label="④ 记录 tab · 只读日历" width={360} height={780}>
              <BFRecord/>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="flow-e"
            title="E · 男生视角：关系解除"
            subtitle="消息 tab（解除通知）→ 聊天详情"
          >
            <DCArtboard id="e1" label="① 消息 tab（收到解除通知）" width={360} height={780}>
              <Screen_BFMessages/>
            </DCArtboard>
            <DCArtboard id="e2" label="② 聊天详情（解除伴侣通知）" width={360} height={780}>
              <Screen_BFChatDetail/>
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
