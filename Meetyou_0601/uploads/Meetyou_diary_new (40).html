<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <title>恋爱日记 · 新版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    html,body{margin:0;padding:0;height:100%;background:#EDECEA;
      font-family:-apple-system,"PingFang SC","Helvetica Neue",system-ui,sans-serif;overflow:hidden;}
    *{box-sizing:border-box;}
    #root{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
    ::-webkit-scrollbar{display:none;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes ripple{0%{transform:scale(1);opacity:0.6}100%{transform:scale(2.4);opacity:0;}}
    @keyframes waveBar{0%,100%{height:4px}50%{height:14px}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatHeart{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-52px) scale(0.3);opacity:0}}
    @keyframes heartPop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.35);opacity:1}100%{transform:scale(1);opacity:1}}
    @keyframes reactionSlideIn{from{opacity:0;transform:translateY(-4px) scaleY(0.9)}to{opacity:1;transform:translateY(0) scaleY(1)}}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ── Tokens ──────────────────────────────────────────────────────
const T = {
  rose:'#FF4D88', roseSoft:'rgba(255,77,136,0.10)', roseMid:'rgba(255,77,136,0.22)',
  bg:'#F2F2F5', white:'#FFFFFF',
  textPri:'#1A1A1A', textSec:'#666666', textTer:'#AAAAAA',
  line:'rgba(0,0,0,0.07)', blue:'#A8C5E0', pink:'#FFB5C8',
  font:'"PingFang SC","SF Pro Text","Helvetica Neue",sans-serif',
};
const ME    = { name:'女友殿下', initial:'女', color:T.pink };
const LOVER = { name:'男友先生', initial:'男', color:T.blue };

const INITIAL_POSTS = [
  { id:1, author:ME, time:'21:42', daysTag:'第102天', kind:'text',
    text:'一起走完雁荡山，下山的时候腿都软了 😂 真的好有成就感！',
    photos:3, likes:[LOVER],
    reactions:{ [LOVER.name]:{ person:LOVER, emojis:['🥰','💕'] } },
    comments:[{author:LOVER,text:'辛苦你了～下次一起去麦理浩径吧 🥾'}] },
  { id:5, author:LOVER, time:'14:20', daysTag:'第102天', kind:'text',
    text:'今天出发前帮你备好了防晒和水，出门记得带哦 ☀️',
    photos:0, likes:[], reactions:{}, comments:[] },
  { id:2, author:LOVER, time:'23:08', daysTag:'第101天', kind:'voice',
    voiceSec:18,
    photos:0, likes:[ME],
    reactions:{ [ME.name]:{ person:ME, emojis:['🤗'] } },
    comments:[{author:ME,text:'没事啦，谢谢你这么细心 ❤︎'}] },
  { id:3, author:ME, time:'20:15', daysTag:'第97天', kind:'text',
    text:'你送我的玫瑰真的好惊喜，第一次有人这样认真挑花给我 🌹',
    photos:2, likes:[LOVER],
    reactions:{
      [LOVER.name]:{ person:LOVER, emojis:['😘','❤️'] },
      [ME.name]:   { person:ME,    emojis:['💕'] },
    },
    comments:[{author:LOVER,text:'你笑的样子比花还好看'}] },
  { id:4, author:LOVER, time:'19:30', daysTag:'第94天', kind:'voice',
    voiceSec:9,
    photos:0, likes:[],
    reactions:{},
    comments:[] },
];

// ── Avatar ───────────────────────────────────────────────────────
// Female silhouette (ME = pink) vs male silhouette (LOVER = blue)
function Ava({ person, size=36 }) {
  const isFemale = person === ME;
  return (
    <div style={{ width:size, height:size, borderRadius:'50%',
      background:person.color, flexShrink:0, overflow:'hidden',
      display:'flex', alignItems:'flex-end', justifyContent:'center' }}>
      {isFemale
        ? /* female silhouette */
          <svg width={size*0.72} height={size*0.82} viewBox="0 0 36 41" fill="none">
            {/* head */}
            <ellipse cx="18" cy="10" rx="7" ry="7.5" fill="rgba(255,255,255,0.92)"/>
            {/* hair top */}
            <path d="M11 10 Q11 2 18 2 Q25 2 25 10" fill="rgba(255,255,255,0.92)"/>
            {/* hair sides */}
            <path d="M11 8 Q9 12 10 16" stroke="rgba(255,255,255,0.92)" strokeWidth="2.5" strokeLinecap="round"/>
            <path d="M25 8 Q27 12 26 16" stroke="rgba(255,255,255,0.92)" strokeWidth="2.5" strokeLinecap="round"/>
            {/* body / dress */}
            <path d="M10 22 Q10 18 18 18 Q26 18 26 22 L29 41 H7 Z" fill="rgba(255,255,255,0.92)"/>
            {/* waist taper */}
            <path d="M13 20 Q18 23 23 20" stroke="rgba(255,255,255,0.3)" strokeWidth="1" fill="none"/>
          </svg>
        : /* male silhouette */
          <svg width={size*0.72} height={size*0.82} viewBox="0 0 36 41" fill="none">
            {/* head */}
            <ellipse cx="18" cy="10" rx="7" ry="7.5" fill="rgba(255,255,255,0.92)"/>
            {/* short hair */}
            <path d="M11 10 Q11 3 18 3 Q25 3 25 10 L25 8 Q18 5 11 8 Z" fill="rgba(255,255,255,0.92)"/>
            {/* body / shoulders broad */}
            <path d="M8 22 Q8 18 18 18 Q28 18 28 22 L27 41 H9 Z" fill="rgba(255,255,255,0.92)"/>
            {/* collar line */}
            <path d="M15 18 L18 22 L21 18" stroke="rgba(255,255,255,0.35)" strokeWidth="1" fill="none"/>
          </svg>
      }
    </div>
  );
}

// ── Voice bubble ─────────────────────────────────────────────────
function VoiceBubble({ sec, playing, onPlay }) {
  const bars = 20;
  const heights = Array.from({length:bars},(_,i)=>{
    const x = i/bars;
    return 3 + Math.round(Math.sin(x*Math.PI*3+1)*5 + Math.sin(x*Math.PI*7)*3 + 3);
  });
  return (
    <div onClick={onPlay} style={{
      display:'inline-flex', alignItems:'center', gap:8,
      background: playing ? T.roseSoft : T.bg,
      border:`1.5px solid ${playing ? T.rose : 'transparent'}`,
      borderRadius:20, padding:'8px 14px', cursor:'pointer',
      transition:'all 0.2s', marginTop:6,
    }}>
      {/* play/pause icon */}
      <div style={{ width:28,height:28,borderRadius:'50%',
        background: playing ? T.rose : T.rose,
        display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0 }}>
        {playing
          ? <svg width="10" height="12" viewBox="0 0 10 12"><rect x="0" y="0" width="3.5" height="12" rx="1.5" fill="#fff"/><rect x="6.5" y="0" width="3.5" height="12" rx="1.5" fill="#fff"/></svg>
          : <svg width="10" height="12" viewBox="0 0 10 12"><path d="M1 1l8 5-8 5V1z" fill="#fff"/></svg>
        }
      </div>
      {/* waveform */}
      <div style={{ display:'flex',alignItems:'center',gap:2.5,height:20 }}>
        {heights.map((h,i)=>(
          <div key={i} style={{
            width:2.5, height:h,
            background: playing ? T.rose : '#C0B8C8',
            borderRadius:2,
            animation: playing ? `waveBar ${0.5+i*0.04}s ease-in-out infinite alternate` : 'none',
            animationDelay: playing ? `${i*0.04}s` : '0s',
            transition:'background 0.2s',
          }}/>
        ))}
      </div>
      {/* duration */}
      <span style={{ fontSize:12.5,color: playing ? T.rose : T.textSec,fontWeight:500,flexShrink:0 }}>
        {sec}"
      </span>
    </div>
  );
}

// ── Photo grid ───────────────────────────────────────────────────
function PhotoGrid({ count }) {
  if (!count) return null;
  const cols = count===1?1:count===2?2:3;
  const size = count===1?160:count===2?110:80;
  return (
    <div style={{ display:'grid',gridTemplateColumns:`repeat(${cols},${size}px)`,gap:3,margin:'8px 0' }}>
      {Array.from({length:count}).map((_,i)=>(
        <div key={i} style={{ width:size,height:size,borderRadius:6,
          background:`hsl(${340+i*20},60%,${88-i*4}%)` }}/>
      ))}
    </div>
  );
}

// ── Reply input (inline, uses mock keyboard via lifted state) ────
function ReplyBox({ postId, replyText, kbOpen, onOpenKb, onSubmit, onClose }) {
  const submit = () => { if (replyText.trim()) { onSubmit(postId, replyText.trim()); } };
  return (
    <div style={{ marginTop:8, animation:'fadeIn 0.18s ease' }}>
      <div style={{ display:'flex',gap:8,alignItems:'flex-end' }}>
        <Ava person={ME} size={26}/>
        {/* Display pill — click opens mock keyboard */}
        <div onClick={onOpenKb} style={{
          flex:1, background:kbOpen?T.white:T.bg,
          borderRadius:16, border:`1.5px solid ${kbOpen?T.rose:'transparent'}`,
          padding:'6px 12px', display:'flex', alignItems:'center',
          cursor:'text', minHeight:34, transition:'border 0.15s,background 0.15s',
        }}>
          <span style={{ flex:1, fontSize:13.5, color:replyText?T.textPri:T.textTer,
            fontFamily:T.font, wordBreak:'break-all', whiteSpace:'pre-wrap', minHeight:18 }}>
            {replyText||'写下你的回复…'}
          </span>
          {kbOpen && <span style={{ display:'inline-block',width:2,height:16,
            background:T.rose,borderRadius:1,marginLeft:1,
            animation:'blink 1s step-end infinite' }}/>}
        </div>
        <button onClick={submit} style={{
          height:34, padding:'0 12px', borderRadius:17,
          background:replyText.trim()?T.rose:'#E0DDE6',
          color:replyText.trim()?'#fff':T.textTer,
          border:'none', fontSize:13, fontWeight:600, cursor:'pointer',
          transition:'background 0.2s', fontFamily:T.font, flexShrink:0,
        }}>回复</button>
      </div>
      <div onClick={onClose} style={{ textAlign:'right',fontSize:12,color:T.textTer,
        marginTop:4,cursor:'pointer',paddingRight:4 }}>取消</div>
    </div>
  );
}

// ── Single post (timeline layout) ────────────────────────────────
function Post({ post, onReply, onDelete, replyingId, replyText, replyKbOpen, onOpenReply, onCloseReply, onOpenReplyKb, playingId, onPlay, isLast, hideDayTag }) {
  const isReplying = replyingId === post.id;
  const isPlaying  = playingId  === post.id;
  const isMe       = post.author === ME;
  const [showManage, setShowManage] = useState(false);

  // opponent is always the other person
  const opponent = isMe ? LOVER : ME;

  return (
    <div style={{ display:'flex', gap:0, animation:'fadeIn 0.22s ease',
      paddingLeft:16, paddingRight:16 }}
      onClick={()=>showManage && setShowManage(false)}>

      {/* ── Timeline axis: narrow column, dot + vertical line ── */}
      <div style={{ width:18, flexShrink:0, display:'flex', flexDirection:'column',
        alignItems:'center', paddingTop: hideDayTag ? 0 : 4 }}>
        {/* Dot — only on first entry of the day */}
        {!hideDayTag && (
          <div style={{ width:9, height:9, borderRadius:'50%',
            background:T.rose, flexShrink:0, zIndex:1 }}/>
        )}
        {/* Vertical line — full height for all entries */}
        {!isLast && (
          <div style={{ flex:1, width:1, background:'#E8E8E8',
            marginTop: hideDayTag ? 0 : 3 }}/>
        )}
      </div>

      {/* ── Content area ── */}
      <div style={{ flex:1, minWidth:0,
        paddingBottom: isLast ? 12 : 20, paddingLeft:10 }}>

        {/* Day label row — only on first entry of the day */}
        {!hideDayTag && (
          <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:8 }}>
            <span style={{ fontSize:14, fontWeight:700, color:T.textPri, lineHeight:1 }}>
              {post.daysTag}
            </span>
          </div>
        )}

        {/* Author + time + manage */}
        <div style={{ display:'flex', alignItems:'center', gap:6,
          marginBottom:6, paddingTop: hideDayTag ? 1 : 0 }}>
          <Ava person={post.author} size={22}/>
          <span style={{ fontSize:12.5, fontWeight:600,
            color: isMe ? T.rose : '#4A7AAF' }}>{post.author.name}</span>
          {post.kind==='voice' && (
            <span style={{ fontSize:10, color:T.textTer, background:T.bg,
              padding:'1px 5px', borderRadius:99 }}>🎙</span>
          )}
          <span style={{ fontSize:11, color:T.textTer, marginLeft:'auto' }}>{post.time}</span>
          {/* Manage entry — own posts only */}
          {isMe && (
            <div style={{ position:'relative' }}>
              <button onClick={e=>{ e.stopPropagation(); setShowManage(s=>!s); }}
                style={{ background:'none', border:'none', cursor:'pointer',
                  padding:'2px 4px', opacity:0.4, lineHeight:1 }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                  <circle cx="5" cy="12" r="1.5" fill={T.textSec}/>
                  <circle cx="12" cy="12" r="1.5" fill={T.textSec}/>
                  <circle cx="19" cy="12" r="1.5" fill={T.textSec}/>
                </svg>
              </button>
              {showManage && (
                <div onClick={e=>e.stopPropagation()}
                  style={{ position:'absolute', top:20, right:0,
                    background:T.white, borderRadius:10, overflow:'hidden',
                    boxShadow:'0 4px 16px rgba(0,0,0,0.12)', minWidth:100, zIndex:30 }}>
                  <div onClick={()=>{ onDelete(post.id); setShowManage(false); }}
                    style={{ display:'flex', alignItems:'center', gap:8,
                      padding:'10px 14px', fontSize:13, color:'#E03050', cursor:'pointer' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                      <polyline points="3 6 5 6 21 6" stroke="#E03050" strokeWidth="1.6" strokeLinecap="round"/>
                      <path d="M19 6l-1 14H6L5 6" stroke="#E03050" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                      <path d="M10 11v6M14 11v6" stroke="#E03050" strokeWidth="1.6" strokeLinecap="round"/>
                      <path d="M9 6V4h6v2" stroke="#E03050" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    删除
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Content bubble */}
        <div style={{ background:T.bg, borderRadius:12, padding:'10px 12px',
          borderTopLeftRadius: isMe ? 12 : 4,
          borderTopRightRadius: isMe ? 4 : 12 }}>
          {post.kind==='voice'
            ? <VoiceBubble sec={post.voiceSec} playing={isPlaying} onPlay={()=>onPlay(post.id)}/>
            : <div style={{ fontSize:14, color:T.textPri, lineHeight:'22px', wordBreak:'break-all' }}>{post.text}</div>
          }
          <PhotoGrid count={post.photos}/>
        </div>

        {/* Comments + reply */}
        <div style={{ marginTop:6 }}>
          {post.comments.map((c,i)=>(
            <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:4,
              marginBottom:4, animation:'fadeIn 0.18s ease' }}>
              <div style={{ flex:1, fontSize:12.5, lineHeight:'18px' }}>
                <span style={{ fontWeight:600,
                  color: c.author===ME ? T.rose : '#4A7AAF', marginRight:3 }}>
                  {c.author.name}
                </span>
                {c.kind==='voice'
                  ? <span style={{ display:'inline-flex',alignItems:'center',gap:3,
                      background:T.bg,borderRadius:8,padding:'1px 7px',fontSize:11.5,color:T.textSec }}>
                      🎙 {c.voiceSec}"</span>
                  : c.kind==='photo'
                  ? <span style={{ display:'inline-flex',alignItems:'center',gap:3,
                      background:'rgba(74,122,175,0.07)',borderRadius:8,padding:'1px 7px',
                      fontSize:11.5,color:T.textSec }}>📷</span>
                  : <span style={{ color:T.textSec }}>{c.text}</span>
                }
              </div>
            </div>
          ))}

          {/* Reply input — placeholder always "回复 [对方]" */}
          <div onClick={e=>{ e.stopPropagation(); onOpenReply(post.id); }}
            style={{ marginTop: post.comments.length ? 5 : 2,
              cursor:'text', paddingBottom:4,
              borderBottom: isReplying
                ? `1.5px solid ${T.rose}` : `1px solid ${T.line}`,
              transition:'border-color 0.15s' }}>
            <span style={{ fontSize:12, color:T.textTer }}>说点什么…</span>
          </div>
        </div>

      </div>
    </div>
  );
}

// ── XHS-style keyboard panel ─────────────────────────────────────
// Structure: input row | toolbar | suggestions | keys
const ROWS=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['⇧','z','x','c','v','b','n','m','⌫']];
const EMOJIS=['😂','❤️','🥰','😭','🌹','🍵','☕','🥾','✨','💕','🤣','😍','🎉','💪','🙏'];
const SUGGESTIONS=['❤️','🥰','😘','今天','在一起','好开心','爱你','想你','记录','一起'];

function MockKeyboard({ text, placeholder, onChar, onDelete, onEnter, onClose, onVoice, onPhoto, onVideo, sendLabel='发送' }) {
  const [shifted,setShifted]   = useState(false);
  const [panel,setPanel]       = useState('keys'); // keys | emoji

  const bg='#D1D5DB', keyBg='#FFFFFF', specBg='#ADB5BD';

  const press = k => {
    if(k==='⌫'){ onDelete(); return; }
    if(k==='⇧'){ setShifted(s=>!s); return; }
    onChar(shifted ? k.toUpperCase() : k);
    if(shifted) setShifted(false);
  };

  // Icon helper
  const Ico = ({children, onClick, active, color}) => (
    <div onClick={onClick} style={{
      width:38, height:38, borderRadius:'50%',
      background: active ? 'rgba(255,77,136,0.12)' : 'transparent',
      display:'flex', alignItems:'center', justifyContent:'center',
      cursor:'pointer', flexShrink:0,
    }}>{children}</div>
  );

  return (
    <div style={{ position:'absolute',bottom:0,left:0,right:0,
      background:'#F7F7F7', zIndex:20,
      animation:'slideUp 0.22s cubic-bezier(0.32,0.72,0,1)',
      boxShadow:'0 -1px 0 rgba(0,0,0,0.08)' }}>

      {/* ① Input row */}
      <div style={{ display:'flex',alignItems:'center',gap:8,
        padding:'8px 12px 6px', background:T.white,
        borderBottom:`1px solid ${T.line}` }}>
        <div style={{ flex:1, background:'#F2F2F5', borderRadius:20,
          padding:'7px 14px', display:'flex', alignItems:'center',
          border:`1.5px solid ${T.rose}`, minHeight:36 }}>
          <span style={{ flex:1, fontSize:14, lineHeight:'20px',
            color: text ? T.textPri : T.textTer,
            fontFamily:T.font, wordBreak:'break-all',
            whiteSpace:'pre-wrap', minHeight:20 }}>
            {text || placeholder || '记录这一刻…'}
          </span>
          <span style={{ display:'inline-block',width:2,height:18,
            background:T.rose,borderRadius:1,marginLeft:1,
            animation:'blink 1s step-end infinite' }}/>
        </div>
        <button onMouseDown={e=>{e.preventDefault();onEnter();}}
          style={{ height:34, padding:'0 16px', borderRadius:17,
            background: text.trim() ? T.rose : '#E0DDE6',
            color: text.trim() ? '#fff' : T.textTer,
            border:'none', fontSize:13.5, fontWeight:600, cursor:'pointer',
            transition:'background 0.18s', fontFamily:T.font, flexShrink:0,
            whiteSpace:'nowrap' }}>{sendLabel}</button>
      </div>

      {/* ② Toolbar row */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-around',
        padding:'4px 8px', background:T.white,
        borderBottom:`1px solid ${T.line}` }}>
        {/* Voice */}
        <Ico onClick={onVoice}>
          <svg width="20" height="24" viewBox="0 0 16 20" fill="none">
            <rect x="5" y="1" width="6" height="10" rx="3" fill={T.textSec}/>
            <path d="M2 9c0 3.314 2.686 6 6 6s6-2.686 6-6" stroke={T.textSec} strokeWidth="1.6" strokeLinecap="round"/>
            <line x1="8" y1="15" x2="8" y2="19" stroke={T.textSec} strokeWidth="1.6" strokeLinecap="round"/>
            <line x1="5" y1="19" x2="11" y2="19" stroke={T.textSec} strokeWidth="1.6" strokeLinecap="round"/>
          </svg>
        </Ico>
        {/* Photo */}
        <Ico onClick={onPhoto}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="5" width="20" height="15" rx="2.5" stroke={T.textSec} strokeWidth="1.6"/>
            <circle cx="12" cy="12.5" r="3.5" stroke={T.textSec} strokeWidth="1.6"/>
            <path d="M7 5l1.5-2h7L17 5" stroke={T.textSec} strokeWidth="1.6" strokeLinejoin="round"/>
          </svg>
        </Ico>
        {/* Video */}
        <Ico onClick={onVideo}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="5" width="15" height="14" rx="2" stroke={T.textSec} strokeWidth="1.6"/>
            <path d="M17 9l5-3v12l-5-3V9z" stroke={T.textSec} strokeWidth="1.6" strokeLinejoin="round"/>
          </svg>
        </Ico>
        {/* Emoji toggle */}
        <Ico onClick={()=>setPanel(p=>p==='emoji'?'keys':'emoji')} active={panel==='emoji'}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke={panel==='emoji'?T.rose:T.textSec} strokeWidth="1.6"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2" stroke={panel==='emoji'?T.rose:T.textSec} strokeWidth="1.6" strokeLinecap="round"/>
            <circle cx="9" cy="10" r="1.2" fill={panel==='emoji'?T.rose:T.textSec}/>
            <circle cx="15" cy="10" r="1.2" fill={panel==='emoji'?T.rose:T.textSec}/>
          </svg>
        </Ico>
        {/* Collapse */}
        <Ico onClick={onClose}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M6 15l6-6 6 6" stroke={T.textSec} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </Ico>
      </div>

      {/* ③ Suggestion strip */}
      <div style={{ display:'flex', alignItems:'center', gap:0,
        overflowX:'auto', padding:'5px 10px',

      )}
    </div>
  );
}

// ── Voice recorder overlay ────────────────────────────────────────
function VoiceRecorder({ onFinish, onCancel }) {
  const [sec, setSec]         = useState(0);
  const [phase, setPhase]     = useState('recording'); // recording | preview | cancel
  const intervalRef           = useRef(null);

  useEffect(() => {
    intervalRef.current = setInterval(()=>setSec(s=>s+1), 1000);
    return ()=>clearInterval(intervalRef.current);
  }, []);

  const stopRecording = () => {
    clearInterval(intervalRef.current);
    setPhase('preview');
  };
  const confirmSend = () => onFinish(sec);
  const reRecord = () => {
    setSec(0);
    setPhase('recording');
    intervalRef.current = setInterval(()=>setSec(s=>s+1), 1000);
  };

  const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  // waveform bars
  const BARS = 28;
  return (
    <div style={{ position:'absolute',inset:0,background:'rgba(0,0,0,0.55)',
      display:'flex',alignItems:'flex-end',zIndex:30,
      animation:'fadeIn 0.18s ease' }}>
      <div style={{ width:'100%',background:T.white,borderRadius:'20px 20px 0 0',
        padding:'24px 20px 32px' }}>

        {/* Title */}
        <div style={{ textAlign:'center',marginBottom:20 }}>
          <div style={{ fontSize:15,fontWeight:600,color:T.textPri }}>
            {phase==='recording'?'正在录音…':phase==='preview'?'预览语音':''}
          </div>
          <div style={{ fontSize:26,fontWeight:700,color:T.rose,marginTop:6,
            fontVariantNumeric:'tabular-nums',letterSpacing:2 }}>
            {fmt(sec)}
          </div>
        </div>

        {/* Waveform animation */}
        <div style={{ display:'flex',justifyContent:'center',alignItems:'center',
          gap:3,height:40,marginBottom:24 }}>
          {Array.from({length:BARS}).map((_,i)=>{
            const h = 4+Math.round(Math.sin(i/BARS*Math.PI*4)*8+Math.sin(i/BARS*Math.PI*9)*5+6);
            return (
              <div key={i} style={{
                width:3,height:h,borderRadius:2,
                background: phase==='recording' ? T.rose : '#C0B8C8',
                animation: phase==='recording'
                  ? `waveBar ${0.45+i*0.035}s ease-in-out infinite alternate`
                  : 'none',
                animationDelay:`${i*0.035}s`,
              }}/>
            );
          })}
        </div>

        {/* Buttons */}
        {phase==='recording' ? (
          <div style={{ display:'flex',justifyContent:'center',gap:24 }}>
            {/* Cancel */}
            <button onClick={onCancel} style={{ width:56,height:56,borderRadius:'50%',
              background:'#F2F2F5',border:'none',cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:4 }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke={T.textSec} strokeWidth="2.2" strokeLinecap="round"/>
              </svg>
              <span style={{ fontSize:10,color:T.textSec }}>取消</span>
            </button>
            {/* Stop = big red circle */}
            <button onClick={stopRecording} style={{ width:72,height:72,borderRadius:'50%',
              background:T.rose,border:'none',cursor:'pointer',position:'relative',
              boxShadow:`0 0 0 8px ${T.roseSoft}`,
              display:'flex',alignItems:'center',justifyContent:'center' }}>
              <div style={{ width:22,height:22,borderRadius:4,background:'#fff' }}/>
              {/* ripple */}
              <div style={{ position:'absolute',inset:-4,borderRadius:'50%',
                border:`2px solid ${T.rose}`,opacity:0.4,
                animation:'ripple 1.4s ease-out infinite' }}/>
            </button>
          </div>
        ) : (
          <div style={{ display:'flex',justifyContent:'center',gap:16 }}>
            {/* Re-record */}
            <button onClick={reRecord} style={{ flex:1,height:46,borderRadius:23,
              background:'#F2F2F5',border:'none',cursor:'pointer',
              fontSize:14,color:T.textSec,fontFamily:T.font }}>重录</button>
            {/* Cancel */}
            <button onClick={onCancel} style={{ height:46,width:46,borderRadius:23,
              background:'#F2F2F5',border:'none',cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center' }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke={T.textSec} strokeWidth="2" strokeLinecap="round"/>
              </svg>
            </button>
            {/* Send */}
            <button onClick={confirmSend} style={{ flex:1,height:46,borderRadius:23,
              background:T.rose,border:'none',cursor:'pointer',
              fontSize:14,fontWeight:600,color:'#fff',fontFamily:T.font }}>发送语音</button>
          </div>
        )}
      </div>
    </div>
  );
}

function DiaryScreen() {
  const [posts,setPosts] = useState(INITIAL_POSTS.map(p=>({...p})));

  const [text,setText]           = useState('');
  const [kbOpen,setKbOpen]       = useState(false);
  const [sending,setSending]     = useState(false);
  const [replyingId,setReply]    = useState(null);
  const [replyText,setReplyText] = useState('');
  const [replyKbOpen,setReplyKb] = useState(false);
  const [replyVoice,setReplyVoice] = useState(false);
  const [playingId,setPlaying]   = useState(null);
  const [showVoice,setVoice]     = useState(false);
  const [toast,setToast]         = useState('');
  const [coverImg,setCoverImg]   = useState(null);
  const [showMore,setShowMore]   = useState(false);
  const [navScrolled,setNavScrolled] = useState(false);
  const coverInputRef            = useRef(null);
  const feedRef  = useRef(null);

  useEffect(()=>{
    const el = feedRef.current;
    if (!el) return;
    const onScroll = () => setNavScrolled(el.scrollTop > 160);
    el.addEventListener('scroll', onScroll);
    return () => el.removeEventListener('scroll', onScroll);
  }, []);
  const hiddenRef = useRef(null);
  const KB_H = 260;

  useEffect(()=>{
    if(playingId===null) return;
    const post = posts.find(p=>p.id===playingId);
    if(!post) return;
    const t = setTimeout(()=>setPlaying(null), (post.voiceSec||5)*1000);
    return ()=>clearTimeout(t);
  },[playingId]);

  const handleDelete = id => setPosts(ps=>ps.filter(p=>p.id!==id));

  const handleReply = (id, val) => {
    setPosts(ps=>ps.map(p=>p.id===id?{...p,comments:[...p.comments,{author:ME,text:val}]}:p));
    setReply(null); setReplyText(''); setReplyKb(false);
  };

  const handleSend = useCallback(()=>{
    if(!text.trim()) return;
    setSending(true);
    setTimeout(()=>{
      const np={id:Date.now(),author:ME,daysTag:'今天',kind:'text',
        time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
        text:text.trim(),photos:0,likes:[],comments:[],liked:false};
      setPosts(ps=>[np,...ps]);
      setText('');setSending(false);setKbOpen(false);
      if(feedRef.current) feedRef.current.scrollTop=0;
    },350);
  },[text]);

  const handleVoiceFinish = sec => {
    setVoice(false);
    const np={id:Date.now(),author:ME,daysTag:'今天',kind:'voice',voiceSec:sec,
      time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
      photos:0,likes:[],comments:[],liked:false};
    setPosts(ps=>[np,...ps]);
    if(feedRef.current) feedRef.current.scrollTop=0;
  };

  const handleReplyVoiceFinish = sec => {
    setReplyVoice(false);
    if(replyingId===null) return;
    setPosts(ps=>ps.map(p=>p.id===replyingId
      ? {...p, comments:[...p.comments,{author:ME,kind:'voice',voiceSec:sec}]}
      : p));

  const handleReplyPhoto = () => {
    if(replyingId===null) return;

      ? {...p, comments:[...p.comments,{author:ME,kind:'photo',photos:1}]}

    setReply(null); setReplyText(''); setReplyKb(false);

  const closeKb=()=>{ setKbOpen(false); if(hiddenRef.current) hiddenRef.current.blur(); };
  const openReplyKb=()=>{ setReplyKb(true); setKbOpen(false); if(hiddenRef.current) hiddenRef.current.blur(); };
  const closeReplyKb=()=>setReplyKb(false);

    <div style={{ width:375,height:780,borderRadius:44,overflow:'hidden',position:'relative',
      boxShadow:'0 32px 80px rgba(0,0,0,0.28),0 0 0 1px rgba(0,0,0,0.07)',

      {/* Hidden real textarea */}
      <textarea ref={hiddenRef} value={text} onChange={e=>setText(e.target.value)}
        style={{ position:'absolute',left:-9999,top:-9999,opacity:0,width:1,height:1,border:'none',outline:'none' }}/>

      {/* Status bar */}

        transition:'transform 0.25s cubic-bezier(0.32,0.72,0,1)',
        transform: kbOpen ? `translateY(-${KB_H}px)` : replyKbOpen ? `translateY(100px)` : 'translateY(0)',
        zIndex:10 }}>
        <div style={{ width:120,height:4,background:T.textPri,borderRadius:2,opacity:0.15 }}/>
      </div>

      {/* Main compose keyboard */}
      {kbOpen && !replyKbOpen && (
        <MockKeyboard
          text={text}
          placeholder="记录这一刻…"
          onChar={c=>setText(t=>t+c)}
          onDelete={()=>setText(t=>t.slice(0,-1))}
          onEnter={handleSend}
          onClose={closeKb}
          onVoice={()=>{ closeKb(); setVoice(true); }}
          onPhoto={()=>{ setToast('图片已选择'); setTimeout(()=>setToast(''),2000); closeKb(); }}
          onVideo={()=>{ setToast('视频已选择'); setTimeout(()=>setToast(''),2000); closeKb(); }}
          sendLabel="发布"
        />
      )}
      {kbOpen && !replyKbOpen && (
        <div onClick={closeKb} style={{ position:'absolute',top:0,left:0,right:0,
          bottom:KB_H+56,zIndex:15 }}/>
      )}

      {/* Reply keyboard — new unified MockKeyboard */}
      {replyKbOpen && (() => {
        const replyPost = posts.find(p=>p.id===replyingId);
        return (
          <MockKeyboard
            text={replyText}
            placeholder={replyPost ? `回复 ${replyPost.author.name}…` : '写下你的回复…'}
            onChar={c=>setReplyText(t=>t+c)}
            onDelete={()=>setReplyText(t=>t.slice(0,-1))}
            onEnter={()=>{ if(replyText.trim()) handleReply(replyingId, replyText.trim()); }}
            onClose={()=>{ setReplyKb(false); setReply(null); setReplyText(''); }}
            onVoice={()=>{ setReplyKb(false); setReplyVoice(true); }}
            onPhoto={handleReplyPhoto}
            onVideo={handleReplyPhoto}
            sendLabel="回复"
          />
        );
      })()}

      {/* Reply voice recorder */}
      {replyVoice && (
        <VoiceRecorder onFinish={handleReplyVoiceFinish} onCancel={()=>{ setReplyVoice(false); setReplyKb(true); }}/>
      )}

      {/* Toast */}
      {toast && (
        <div style={{ position:'absolute',bottom:80,left:'50%',transform:'translateX(-50%)',
          background:'rgba(0,0,0,0.65)',color:'#fff',fontSize:13,padding:'7px 18px',
          borderRadius:20,zIndex:50,whiteSpace:'nowrap',animation:'fadeIn 0.2s ease' }}>
          {toast}
        </div>
      )}

      {/* Voice recorder overlay */}
      {showVoice && (
        <VoiceRecorder onFinish={handleVoiceFinish} onCancel={()=>setVoice(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DiaryScreen/>);
</script>
</body>
</html>
