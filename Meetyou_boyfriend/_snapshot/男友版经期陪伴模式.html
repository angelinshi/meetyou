<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>男友版经期陪伴 · 原型</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&family=Ma+Shan+Zheng&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans SC', -apple-system, system-ui, sans-serif; background: #f0eee9; }
    * { box-sizing: border-box; }
    #root { width: 100vw; height: 100vh; }
    .ios-content::-webkit-scrollbar { display: none; }
    /* sidestep webkit overflow scrollbar */
    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script src="image-slot.js"></script>
  <script type="text/babel" src="shared-bf.jsx"></script>
  <script type="text/babel" src="screens-bf.jsx"></script>

  <script type="text/babel">
    function PhoneFrame({ initial }) {
      return (
        <IOSDevice width={390} height={844}>
          <BFApp initial={initial}/>
        </IOSDevice>
      );
    }

    function MainCanvas() {
      return (
        <DesignCanvas
          title="男友版 · 经期陪伴模式"
          subtitle="3 个关键页面 · 主页可点入详情/日记 · 风格沿用美柚原型"
        >
          <DCSection
            id="screens"
            title="原型流程"
            subtitle="主页 1 → 今日密报 2 / 恋爱日记 3"
          >
            <DCArtboard id="home"   label="① 主页" width={420} height={874}>
              <PhoneFrame initial="home"/>
            </DCArtboard>
            <DCArtboard id="detail" label="② 今日密报（男友视角）" width={420} height={874}>
              <PhoneFrame initial="detail"/>
            </DCArtboard>
            <DCArtboard id="diary"  label="③ 恋爱日记" width={420} height={874}>
              <PhoneFrame initial="diary"/>
            </DCArtboard>
            <DCArtboard id="publish" label="④ 写日记（发布页）" width={420} height={874}>
              <PhoneFrame initial="publish"/>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    function mount() {
      const ready = typeof BFApp !== 'undefined'
        && typeof DesignCanvas !== 'undefined'
        && typeof IOSDevice !== 'undefined';
      if (ready) ReactDOM.createRoot(document.getElementById('root')).render(<MainCanvas/>);
      else setTimeout(mount, 80);
    }
    mount();
  </script>
</body>
</html>
