/* ================================================================
   DESIGN TOKENS
================================================================ */

  bsoft:    'rgba(255,77,136,0.08)',
  bg:       '#f2f2f5',
  sur:      '#ffffff',

  s:        '#666666',

  bluSoft:  'rgba(79,124,174,0.1)',
  grn:      '#00cc99',

/* ================================================================
   PRIMITIVES
================================================================ */

          <rect x="4.5" y="3" width="3" height="8" rx="0.8" opacity="0.5"/>

          <rect x="13.5" y="0" width="3" height="11" rx="0.8"/>

          <path d="M0 5 Q8 0 16 5" stroke={T.p} strokeWidth="1.5" strokeLinecap="round" opacity="0.3"/>

const Nav = ({ title, sub, left = '‹', right = null, leftColor = T.brand, bg = T.sur }) => (
  <div style={{
    height: 44, background: bg, flexShrink: 0,
    display: 'flex', alignItems: 'center', padding: '0 16px',

    <div style={{ flex: 1, textAlign: 'center' }}>
      <div style={{ fontSize: 17, fontWeight: 500, color: T.p, lineHeight: 1.25 }}>{title}</div>
      {sub && <div style={{ fontSize: 11, color: T.t, marginTop: 1 }}>{sub}</div>}
    </div>
    <div style={{ width: 44, display: 'flex', justifyContent: 'flex-end', color: T.s, fontSize: 20 }}>
      {right}
    </div>

);

const TabBar = ({ active = 0 }) => {
  const tabsData = [
    { l: '首页', path: 'M3 9.5L11 3l8 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5zM8 21v-7h6v7' },
    { l: '记录', path: 'M5 3h14a1 1 0 011 1v16a1 1 0 01-1 1H5a1 1 0 01-1-1V4a1 1 0 011-1zM8 8h8M8 12h8M8 16h4' },
    { l: '社区', path: 'M4 4h16a1 1 0 011 1v9a1 1 0 01-1 1H7l-4 4V5a1 1 0 011-1z' },
    { l: '我的', path: 'M12 12a4 4 0 100-8 4 4 0 000 8zM4 20c0-3.3 3.6-6 8-6s8 2.7 8 6' },
  ];
  return (
    <div style={{ height: 83, background: T.sur, borderTop: `1px solid ${T.line}`, display: 'flex', flexShrink: 0 }}>
      {tabsData.map((tab, i) => (
        <div key={i} style={{
          flex: 1, display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center', gap: 3, paddingBottom: 16,
          color: i === active ? T.brand : T.t,
        }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            <path d={tab.path}/>
          </svg>
          <span style={{ fontSize: 10, fontWeight: i === active ? 500 : 400 }}>{tab.l}</span>
        </div>
      ))}
    </div>
  );
};

const HomeInd = () => (
  <div style={{ height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center', background: T.sur, flexShrink: 0 }}>
    <div style={{ width: 134, height: 5, borderRadius: 3, background: 'rgba(0,0,0,0.18)' }}/>
  </div>
);

const CycleRing = ({ day = 14, total = 28, size = 80 }) => {
  const r = size * 0.42;
  const c = 2 * Math.PI * r;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.line} strokeWidth={size * 0.08}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.brand} strokeWidth={size * 0.08}
          strokeDasharray={`${c * day/total} ${c}`} strokeLinecap="round"
          transform={`rotate(-90 ${size/2} ${size/2})`}/>
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <span style={{ fontSize: size * 0.27, fontWeight: 600, color: T.brand, lineHeight: 1 }}>{day}</span>
        <span style={{ fontSize: size * 0.12, color: T.t, marginTop: 1 }}>天</span>
      </div>
    </div>
  );
};

const HeartIcon = ({ size = 16, color = T.brand }) => (
  <svg width={size} height={size} viewBox="0 0 16 16" fill={color}>
    <path d="M8 14S2 10 2 5.5A3.5 3.5 0 018 3.2 3.5 3.5 0 0114 5.5C14 10 8 14 8 14z"/>
  </svg>
);

/* ================================================================

================================================================ */
