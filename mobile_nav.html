<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Meetyou · 演示</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{
    width:100%;min-height:100vh;
    background:#F2F0EC;
    font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .safe-top{height:env(safe-area-inset-top,20px);}
  .wrap{padding:0 20px 40px;}
  .header{padding:28px 0 20px;text-align:center;}
  .logo{
    width:56px;height:56px;border-radius:16px;
    background:linear-gradient(135deg,#FF7EB3,#FF4D88);
    display:inline-flex;align-items:center;justify-content:center;
    margin-bottom:12px;box-shadow:0 8px 20px rgba(255,77,136,0.3);
  }
  .header h1{font-size:22px;font-weight:600;color:#323232;letter-spacing:-.3px;}
  .header p{font-size:13px;color:#999;margin-top:4px;}

  .section-label{
    font-size:11px;font-weight:600;color:#aaa;letter-spacing:1px;
    text-transform:uppercase;margin:20px 0 10px;
  }

  .card{
    background:#fff;border-radius:16px;
    display:flex;align-items:center;gap:14px;
    padding:16px;margin-bottom:10px;
    box-shadow:0 2px 10px rgba(50,50,50,.07);
    text-decoration:none;
    cursor:pointer;
    transition:transform .1s,box-shadow .1s;
    -webkit-user-select:none;
  }
  .card:active{transform:scale(0.975);box-shadow:0 1px 6px rgba(50,50,50,.1);}

  .icon-wrap{
    width:48px;height:48px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .card-body{flex:1;min-width:0;}
  .card-title{font-size:16px;font-weight:600;color:#323232;margin-bottom:3px;}
  .card-desc{font-size:12.5px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-arrow{flex-shrink:0;}
  .card-arrow svg{display:block;}

  .badge{
    display:inline-block;padding:2px 8px;border-radius:99px;
    font-size:10px;font-weight:600;margin-left:6px;vertical-align:middle;
  }
  .badge-girl{background:rgba(255,77,136,0.1);color:#ff4d88;}
  .badge-boy{background:rgba(91,156,246,0.12);color:#3171cb;}

  .divider{height:.5px;background:rgba(0,0,0,.08);margin:4px 0;}
</style>
</head>
<body>
<div class="safe-top"></div>
<div class="wrap">

  <div class="header">
    <div class="logo">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <path d="M15 26C8 20 3 15.5 3 10.5 3 7.4 5.4 5 8.5 5c1.74 0 3.41.81 4.5 2.09C14.09 5.81 15.76 5 17.5 5 20.6 5 23 7.4 23 10.5c0 5-5 9.5-8 10.5z" fill="#fff" opacity=".9"/>
        <path d="M15 22c-2-1.5-5-4.5-5-7.5 0-1.9 1.6-3.5 3.5-3.5.74 0 1.4.22 2 .6a3.5 3.5 0 012-.6C19.4 11 21 12.6 21 14.5c0 3-3 6-6 7.5z" fill="#fff"/>
      </svg>
    </div>
    <h1>Meetyou 经期男友版</h1>
    <p>选择视角开始体验</p>
  </div>

  <!-- 女生视角 -->
  <div class="section-label">女生视角</div>

  <a class="card" href="girl_home_mobile.html?screen=s1">
    <div class="icon-wrap" style="background:linear-gradient(135deg,#FFD0E2,#FF8FB0);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="7" r="5" stroke="#fff" stroke-width="1.8"/>
        <path d="M3 21c0-5 4-9 9-9s9 4 9 9" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-title">未邀请主页<span class="badge badge-girl">未绑定</span></div>
      <div class="card-desc">查看周期数据 · 发起邀请伴侣</div>
    </div>
    <div class="card-arrow">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
        <path d="M1 1l6 6-6 6" stroke="#C8C4C0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </a>

  <a class="card" href="girl_home_mobile.html?screen=s4">
    <div class="icon-wrap" style="background:linear-gradient(135deg,#FF7EB3,#FF4D88);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 21C6.5 15.5 2 11.5 2 7.5 2 4.42 4.42 2 7.5 2c1.74 0 3.41.81 4.5 2.09C13.09 2.81 14.76 2 16.5 2 19.58 2 22 4.42 22 7.5c0 4-4.5 8-10 13.5z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-title">已邀请主页<span class="badge badge-girl">已绑定</span></div>
      <div class="card-desc">查看恋爱记 · 共同记录生活</div>
    </div>
    <div class="card-arrow">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
        <path d="M1 1l6 6-6 6" stroke="#C8C4C0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </a>

  <!-- 男生视角 -->
  <div class="section-label">男生视角</div>

  <a class="card" href="girl_home_mobile.html?screen=bf1">
    <div class="icon-wrap" style="background:linear-gradient(135deg,#7AB8F5,#3171CB);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="7" r="5" stroke="#fff" stroke-width="1.8"/>
        <path d="M3 21c0-5 4-9 9-9s9 4 9 9" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-title">男友主页<span class="badge badge-boy">男生端</span></div>
      <div class="card-desc">今日密报 · 恋爱记 · 互动记录</div>
    </div>
    <div class="card-arrow">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
        <path d="M1 1l6 6-6 6" stroke="#C8C4C0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </a>

  <!-- 设计探索 -->
  <div class="section-label">设计探索</div>


  <a class="card" href="diary_v7_mobile.html">
    <div class="icon-wrap" style="background:linear-gradient(135deg,#C084FC,#7C3AED);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-title">恋爱记发布器探索 <span class="badge" style="background:rgba(124,58,237,0.1);color:#7C3AED">手机版</span></div>
      <div class="card-desc">4 种方案切换查看 · 适配手机</div>
    </div>
    <div class="card-arrow">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
        <path d="M1 1l6 6-6 6" stroke="#C8C4C0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </a>


  <a class="card" href="girl_home_compare_mobile.html">
    <div class="icon-wrap" style="background:linear-gradient(135deg,#FFD0E2,#FF8FB0);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="8" height="18" rx="2" stroke="#fff" stroke-width="1.8"/>
        <rect x="13" y="3" width="8" height="18" rx="2" stroke="#fff" stroke-width="1.8"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-title">女生首页方案对比 <span class="badge badge-girl">手机版</span></div>
      <div class="card-desc">未邀请 vs 已邀请 · 切换查看</div>
    </div>
    <div class="card-arrow">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
        <path d="M1 1l6 6-6 6" stroke="#C8C4C0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </a>

</div>
</html>
